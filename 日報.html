<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日報 — サポートチーム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;}
.container{max-width:1000px;margin:0 auto;padding:1.5rem 2rem;}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#888;text-decoration:none;background:#f0f0eb;border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;padding:5px 12px;margin-bottom:1rem;}
h1{font-size:20px;font-weight:500;color:#1a1a1a;margin-bottom:1.25rem;}

/* ログイン画面 */
.login-screen{min-height:80vh;display:flex;align-items:center;justify-content:center;}
.login-card{background:#fff;border-radius:16px;border:0.5px solid rgba(0,0,0,0.1);padding:2rem;width:320px;}
.login-title{font-size:16px;font-weight:500;color:#1a1a1a;margin-bottom:4px;}
.login-sub{font-size:12px;color:#aaa;margin-bottom:1.5rem;}
.login-members{display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem;}
.member-login-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:0.5px solid rgba(0,0,0,0.1);background:#fafafa;cursor:pointer;font-family:inherit;font-size:13px;color:#1a1a1a;text-align:left;transition:background 0.1s;}
.member-login-btn:hover{background:#f0f0eb;}
.member-login-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.pw-section{border-top:0.5px solid rgba(0,0,0,0.07);padding-top:1rem;}
.pw-label{font-size:11px;color:#aaa;margin-bottom:6px;}
.pw-input{width:100%;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;margin-bottom:8px;}
.pw-input:focus{border-color:#378ADD;}
.pw-error{font-size:12px;color:#e24b4a;margin-bottom:8px;min-height:16px;}
.pw-submit{width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:9px;font-size:13px;cursor:pointer;font-family:inherit;}
.pw-submit:hover{background:#333;}

/* トップバー（ログイン後） */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px;}
.user-info{display:flex;align-items:center;gap:8px;}
.user-dot{width:10px;height:10px;border-radius:50%;}
.user-name{font-size:14px;font-weight:500;}
.logout-btn{font-size:12px;color:#aaa;background:none;border:0.5px solid rgba(0,0,0,0.13);border-radius:7px;padding:4px 10px;cursor:pointer;font-family:inherit;}
.logout-btn:hover{color:#e24b4a;}
.view-toggle{display:flex;gap:6px;}
.view-btn{padding:5px 12px;border-radius:20px;border:0.5px solid rgba(0,0,0,0.13);background:#fff;font-size:12px;cursor:pointer;color:#888;font-family:inherit;}
.view-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}

/* カレンダー */
.cal-wrap{overflow-x:auto;margin-bottom:1.25rem;}
.cal{display:flex;gap:5px;min-width:max-content;padding-bottom:4px;}
.cal-day{width:50px;flex-shrink:0;border-radius:10px;border:0.5px solid rgba(0,0,0,0.1);background:#fff;cursor:pointer;padding:6px 0;text-align:center;}
.cal-day:hover{background:#f0f0eb;}
.cal-day.active{background:#1a1a1a;border-color:#1a1a1a;}
.cal-day.active .cal-dn,.cal-day.active .cal-dd{color:#fff;}
.cal-day.offday{background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.06);}
.cal-day.offday .cal-dn,.cal-day.offday .cal-dd{color:#bbb;}
.cal-day.has-entry::after{content:'';display:block;width:5px;height:5px;border-radius:50%;background:#378ADD;margin:3px auto 0;}
.cal-day.active.has-entry::after{background:#fff;}
.cal-day.closed::after{background:#3b9e5a;}
.cal-dn{font-size:10px;color:#aaa;margin-bottom:1px;}
.cal-dd{font-size:14px;font-weight:500;color:#1a1a1a;}

/* 月ナビ */
.month-nav{display:flex;align-items:center;gap:8px;margin-bottom:1rem;}
.nav-btn{background:#f0f0eb;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:4px 12px;cursor:pointer;font-size:13px;color:#1a1a1a;font-family:inherit;}
.nav-btn:hover{background:#e5e5e0;}
.month-label{font-size:14px;font-weight:500;color:#1a1a1a;min-width:100px;text-align:center;}
.today-btn{background:#fff;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:4px 12px;cursor:pointer;font-size:12px;color:#1a1a1a;font-family:inherit;}

/* 全員ビュー */
.all-view{display:flex;flex-direction:column;gap:12px;}
.member-report-card{background:#fff;border-radius:14px;border:0.5px solid rgba(0,0,0,0.1);overflow:hidden;}
.mrc-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:0.5px solid rgba(0,0,0,0.07);}
.mrc-member{display:flex;align-items:center;gap:8px;}
.mrc-dot{width:9px;height:9px;border-radius:50%;}
.mrc-name{font-size:13px;font-weight:500;}
.mrc-stats{display:flex;align-items:center;gap:10px;font-size:12px;color:#aaa;}
.mrc-closed{font-size:11px;background:#eaf3de;color:#3b6d11;border-radius:5px;padding:2px 7px;}
.mrc-open{font-size:11px;background:#fef9e0;color:#7a6000;border-radius:5px;padding:2px 7px;}
.mrc-body{padding:12px 16px;}
.task-head{display:grid;grid-template-columns:76px 76px 64px 1fr;gap:6px;margin-bottom:4px;}
.task-head span{font-size:11px;color:#bbb;}
.task-row-view{display:grid;grid-template-columns:76px 76px 64px 1fr;gap:6px;align-items:center;padding:4px 0;border-bottom:0.5px solid rgba(0,0,0,0.04);}
.task-row-view:last-child{border-bottom:none;}
.dur-chip{font-size:11px;font-weight:500;border-radius:5px;padding:2px 5px;text-align:center;}
.dur-full{background:#eef4fb;color:#185fa5;}
.dur-part{background:#fef9e0;color:#7a6000;}
.task-content{font-size:12px;color:#1a1a1a;}
.time-text{font-size:12px;color:#555;}
.handover-info{margin-top:8px;padding:8px 10px;background:#fbeaf0;border-radius:8px;font-size:12px;color:#8c0050;}
.memo-view{margin-top:8px;padding:8px 10px;background:#f8f8f5;border-radius:8px;font-size:12px;color:#555;}
.no-report{font-size:13px;color:#bbb;padding:0.5rem 0;}

/* 自分ビュー（入力） */
.my-card{background:#fff;border-radius:14px;border:0.5px solid rgba(0,0,0,0.1);overflow:hidden;}
.my-card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid rgba(0,0,0,0.07);}
.my-date{font-size:14px;font-weight:500;}
.shift-info{font-size:12px;color:#aaa;}
.shift-warn{font-size:12px;color:#e24b4a;background:#fcebeb;border-radius:6px;padding:2px 8px;}
.shift-ok{font-size:12px;color:#3b6d11;background:#eaf3de;border-radius:6px;padding:2px 8px;}
.my-card-body{padding:14px 16px;}

/* タスク入力 */
.task-input-head{display:grid;grid-template-columns:76px 76px 64px 1fr auto;gap:6px;padding:0 2px 6px;border-bottom:0.5px solid rgba(0,0,0,0.05);margin-bottom:6px;}
.task-input-head span{font-size:11px;color:#bbb;}
.task-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.task-input-row{display:grid;grid-template-columns:76px 76px 64px 1fr auto;gap:6px;align-items:center;}
.time-sel{border:0.5px solid rgba(0,0,0,0.13);border-radius:8px;padding:5px 3px;font-size:12px;background:#fff;color:#1a1a1a;font-family:inherit;width:100%;text-align:center;cursor:pointer;appearance:none;-webkit-appearance:none;}
.time-sel:focus{outline:none;border-color:#378ADD;}
.task-text-input{border:0.5px solid rgba(0,0,0,0.13);border-radius:8px;padding:5px 8px;font-size:12px;background:#fff;color:#1a1a1a;font-family:inherit;width:100%;}
.task-text-input:focus{outline:none;border-color:#378ADD;}
.del-btn{background:none;border:none;cursor:pointer;color:#ddd;font-size:15px;padding:0;}
.del-btn:hover{color:#e24b4a;}
.add-task-btn{display:inline-flex;align-items:center;gap:5px;background:transparent;border:0.5px dashed rgba(0,0,0,0.18);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;color:#888;font-family:inherit;margin-bottom:12px;}
.add-task-btn:hover{background:#f5f5f0;}

/* 引き継ぎ */
.handover-section{border-top:0.5px solid rgba(0,0,0,0.06);padding-top:12px;margin-top:4px;}
.section-label-sm{font-size:11px;font-weight:500;color:#aaa;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.section-label-sm::after{content:'';flex:1;height:0.5px;background:rgba(0,0,0,0.07);}
.handover-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;}
.handover-task-input{flex:1;border:0.5px solid rgba(0,0,0,0.13);border-radius:8px;padding:5px 8px;font-size:12px;background:#fff;color:#1a1a1a;font-family:inherit;}
.handover-to-select{border:0.5px solid rgba(0,0,0,0.13);border-radius:8px;padding:5px 8px;font-size:12px;background:#fff;color:#1a1a1a;font-family:inherit;min-width:80px;}
.add-handover-btn{display:inline-flex;align-items:center;gap:5px;background:transparent;border:0.5px dashed rgba(0,0,0,0.18);border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer;color:#888;font-family:inherit;}

/* メモ */
.memo-input{width:100%;border:0.5px solid rgba(0,0,0,0.1);border-radius:8px;padding:8px 10px;font-size:12px;background:#f8f8f5;color:#1a1a1a;font-family:inherit;resize:vertical;min-height:50px;outline:none;}
.memo-input:focus{border-color:#378ADD;background:#fff;}

/* 日報締めボタン */
.close-section{margin-top:14px;padding-top:14px;border-top:0.5px solid rgba(0,0,0,0.06);}
.close-btn{width:100%;background:#3b9e5a;color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;}
.close-btn:hover{background:#2d7a46;}
.close-btn:disabled{background:#bbb;cursor:not-allowed;}
.closed-badge{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:#eaf3de;border-radius:10px;font-size:13px;color:#3b6d11;font-weight:500;}
.reopen-btn{font-size:11px;color:#aaa;background:none;border:0.5px solid rgba(0,0,0,0.13);border-radius:6px;padding:3px 8px;cursor:pointer;font-family:inherit;margin-left:8px;}

/* ChatWork コピーモーダル */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.25);z-index:100;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:16px;border:0.5px solid rgba(0,0,0,0.1);padding:1.5rem;width:100%;max-width:500px;margin:1rem;}
.modal-title{font-size:15px;font-weight:500;margin-bottom:4px;color:#1a1a1a;}
.modal-sub{font-size:12px;color:#aaa;margin-bottom:1rem;}
.chatwork-text{width:100%;border:0.5px solid rgba(0,0,0,0.13);border-radius:8px;padding:10px 12px;font-size:12px;color:#1a1a1a;background:#f8f8f5;font-family:inherit;resize:none;min-height:180px;outline:none;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;}
.copy-btn{background:#3b9e5a;color:#fff;border:none;border-radius:8px;padding:8px 20px;cursor:pointer;font-size:13px;font-family:inherit;}
.copy-btn:hover{background:#2d7a46;}
.close-modal-btn{background:transparent;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;color:#888;font-family:inherit;}

.offday-banner{background:rgba(0,0,0,0.04);border-radius:8px;padding:8px 14px;font-size:13px;color:#aaa;margin-bottom:1rem;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#fff;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:8px 18px;font-size:13px;color:#1a1a1a;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:200;white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,0,0.1);}
.toast.show{opacity:1;}
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, updatePassword, reauthenticateWithCredential, EmailAuthProvider, browserLocalPersistence, setPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  const firebaseConfig = {
  apiKey: "AIzaSyBYqng6-vn341KhqtyjjdIJKbxN8J__ndQ",
  authDomain: "support-team-hub.firebaseapp.com",
  projectId: "support-team-hub",
  storageBucket: "support-team-hub.firebasestorage.app",
  messagingSenderId: "698402996312",
  appId: "1:698402996312:web:7ceec4c0e7fe15ce2cca2d"
};
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const ADMIN_EMAILS = ["suzuki@support.com"];

  const MEMBER_MAP = {'ueda.m@support-grp.jp': {'name': '植田', 'dot': '#b0b0b0', 'isAdmin': false}, 'tmuu1021@gmail.com': {'name': '菅原', 'dot': '#e91e8c', 'isAdmin': false}, 'yoshizaki.r@support-grp.jp': {'name': '吉崎', 'dot': '#378ADD', 'isAdmin': false}, 'harukahongo0513@gmail.com': {'name': '本郷', 'dot': '#f5c518', 'isAdmin': false}, 'yamaguchi.h@support-grp.jp': {'name': '山口', 'dot': '#ff7f2a', 'isAdmin': false}, 'suzuki@support.com': {'name': '鈴木', 'dot': '#3b9e5a', 'isAdmin': true}};
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('firebase-login-screen').style.display = 'none';
      document.getElementById('firebase-app-content').style.display = 'block';
      const memberInfo = MEMBER_MAP[user.email] || { name: user.email, dot: '#888', isAdmin: false };
      const isAdmin = memberInfo.isAdmin;
      window.firebaseUser = { email: user.email, isAdmin, name: memberInfo.name, dot: memberInfo.dot };
      window.dispatchEvent(new Event('firebase-ready'));
    } else {
      document.getElementById('firebase-login-screen').style.display = 'flex';
      document.getElementById('firebase-app-content').style.display = 'none';
    }
  });

  window.firebaseLogin = async function() {
    const email = document.getElementById('fb-email').value.trim();
    const password = document.getElementById('fb-password').value;
    const errEl = document.getElementById('fb-error');
    errEl.textContent = '';
    try {
      await setPersistence(auth, browserLocalPersistence);
      await signInWithEmailAndPassword(auth, email, password);
    } catch(e) {
      errEl.textContent = 'メアドまたはパスワードが違います';
    }
  };

  window.firebaseLogout = async function() {
    await signOut(auth);
  };

  window.firebaseChangePassword = async function() {
    const current = document.getElementById('pw-current').value;
    const newpw = document.getElementById('pw-new').value;
    const confirm = document.getElementById('pw-confirm').value;
    const errEl = document.getElementById('pw-error');
    errEl.textContent = '';
    if(newpw !== confirm){ errEl.textContent = '新しいパスワードが一致しません'; return; }
    if(newpw.length < 6){ errEl.textContent = 'パスワードは6文字以上にしてください'; return; }
    try {
      const user = auth.currentUser;
      const credential = EmailAuthProvider.credential(user.email, current);
      await reauthenticateWithCredential(user, credential);
      await updatePassword(user, newpw);
      document.getElementById('pw-success').textContent = 'パスワードを変更しました！';
      document.getElementById('pw-current').value = '';
      document.getElementById('pw-new').value = '';
      document.getElementById('pw-confirm').value = '';
    } catch(e) {
      errEl.textContent = '現在のパスワードが違います';
    }
  };

  document.addEventListener('keydown', function(e) {
    if(e.key === 'Enter' && document.getElementById('firebase-login-screen').style.display !== 'none') {
      window.firebaseLogin();
    }
  });
</script>

</head>
<body>
<div id="firebase-login-screen" style="display:flex;min-height:100vh;align-items:center;justify-content:center;background:#f5f5f0;position:fixed;inset:0;z-index:9999;">
  <div style="background:#fff;border-radius:16px;border:0.5px solid rgba(0,0,0,0.1);padding:2rem;width:340px;">
    <div style="font-size:16px;font-weight:500;color:#1a1a1a;margin-bottom:4px;">サポートチーム ツールハブ</div>
    <div style="font-size:13px;color:#aaa;margin-bottom:1.5rem;">メアドとパスワードでログイン</div>
    <div style="font-size:11px;color:#aaa;margin-bottom:4px;">メールアドレス</div>
    <input id="fb-email" type="email" placeholder="example@company.com" style="width:100%;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:9px 10px;font-size:13px;font-family:inherit;outline:none;margin-bottom:10px;">
    <div style="font-size:11px;color:#aaa;margin-bottom:4px;">パスワード</div>
    <input id="fb-password" type="password" placeholder="パスワード" style="width:100%;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:9px 10px;font-size:13px;font-family:inherit;outline:none;margin-bottom:8px;">
    <div id="fb-error" style="font-size:12px;color:#e24b4a;margin-bottom:8px;min-height:16px;"></div>
    <button onclick="firebaseLogin()" style="width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;cursor:pointer;font-family:inherit;">ログイン</button>
    <div style="margin-top:1rem;padding-top:1rem;border-top:0.5px solid rgba(0,0,0,0.07);font-size:11px;color:#bbb;text-align:center;">パスワードを忘れた場合は管理者にお問い合わせください</div>
  </div>
</div>
<div id="firebase-user-bar" style="position:fixed;top:12px;right:16px;z-index:500;display:flex;align-items:center;gap:8px;">
  <span id="firebase-user-email" style="font-size:12px;color:#888;"></span>
  <button onclick="document.getElementById('pw-modal-bg').style.display='flex'" style="font-size:12px;color:#aaa;background:#fff;border:0.5px solid rgba(0,0,0,0.13);border-radius:7px;padding:4px 10px;cursor:pointer;font-family:inherit;">🔑 PW変更</button>
  <button onclick="firebaseLogout()" style="font-size:12px;color:#aaa;background:#fff;border:0.5px solid rgba(0,0,0,0.13);border-radius:7px;padding:4px 10px;cursor:pointer;font-family:inherit;">ログアウト</button>
</div>
<script>
window.addEventListener('firebase-ready', function() {
  const bar = document.getElementById('firebase-user-bar');
  if(bar && window.firebaseUser) {
    document.getElementById('firebase-user-email').textContent = window.firebaseUser.email;
  }
});
</script>
<div id="pw-modal-bg" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.25);z-index:9998;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:14px;padding:1.5rem;width:320px;margin:1rem;">
    <div style="font-size:15px;font-weight:500;margin-bottom:1rem;">パスワードを変更</div>
    <div style="font-size:11px;color:#aaa;margin-bottom:4px;">現在のパスワード</div>
    <input id="pw-current" type="password" style="width:100%;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;margin-bottom:10px;">
    <div style="font-size:11px;color:#aaa;margin-bottom:4px;">新しいパスワード</div>
    <input id="pw-new" type="password" style="width:100%;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;margin-bottom:10px;">
    <div style="font-size:11px;color:#aaa;margin-bottom:4px;">新しいパスワード（確認）</div>
    <input id="pw-confirm" type="password" style="width:100%;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;margin-bottom:8px;">
    <div id="pw-error" style="font-size:12px;color:#e24b4a;min-height:16px;margin-bottom:4px;"></div>
    <div id="pw-success" style="font-size:12px;color:#3b9e5a;min-height:16px;margin-bottom:8px;"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button onclick="document.getElementById('pw-modal-bg').style.display='none'" style="background:transparent;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:#888;font-family:inherit;">キャンセル</button>
      <button onclick="firebaseChangePassword()" style="background:#1a1a1a;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:#fff;font-family:inherit;">変更する</button>
    </div>
  </div>
</div>
<div id="firebase-app-content" style="display:none;">
<div class="container">
  <a class="back-btn" href="ホーム.html">◀ ホームに戻る</a>
  <h1>日報 <span style="font-size:13px;color:#888;font-weight:400;">サポートチーム</span></h1>
  <div id="app"></div>
</div>

<!-- ChatWork送信モーダル -->
<div class="modal-bg" id="cw-modal">
  <div class="modal">
    <div class="modal-title">退勤報告 — ChatWork用テキスト</div>
    <div class="modal-sub">以下をコピーしてChatWorkに貼り付けてください</div>
    <textarea class="chatwork-text" id="cw-text" readonly></textarea>
    <div class="modal-actions">
      <button class="close-modal-btn" onclick="closeCwModal()">閉じる</button>
      <button class="copy-btn" onclick="copyCwText()">コピーする</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const NIPPO_KEY='nippe_v3';
const SHIFT_KEY='shiftapp_v5';
const MEMBERS=[
  {name:'植田',dot:'#b0b0b0'},
  {name:'菅原',dot:'#e91e8c'},
  {name:'吉崎',dot:'#378ADD'},
  {name:'本郷',dot:'#f5c518'},
  {name:'山口',dot:'#ff7f2a'},
  {name:'鈴木',dot:'#3b9e5a',isAdmin:true},
];

let state=loadState();
let curUser=null;
let curYear,curMonth,curDay;
let viewMode='all';
let holidays={};

function loadState(){
  try{const s=localStorage.getItem(NIPPO_KEY);if(s)return JSON.parse(s);}catch(e){}
  return{reports:{}};
}
function saveState(){try{localStorage.setItem(NIPPO_KEY,JSON.stringify(state));}catch(e){}}
function rk(y,m,d,n){return `${y}-${m+1}-${d}-${n}`;}
function getReport(y,m,d,n){
  const k=rk(y,m,d,n);
  if(!state.reports[k])state.reports[k]={tasks:[],memo:'',handovers:[],closed:false};
  return state.reports[k];
}

// Firebaseログイン情報からメンバー情報を取得して初期化
window.addEventListener('firebase-ready', async function() {
  const fbUser = window.firebaseUser;
  if(fbUser) {
    curUser = MEMBERS.find(m => m.name === fbUser.name) || {name: fbUser.name, dot: fbUser.dot||'#888', isAdmin: fbUser.isAdmin};
    viewMode = curUser.isAdmin ? 'all' : 'mine';
    const now = new Date();
    curYear = now.getFullYear(); curMonth = now.getMonth(); curDay = now.getDate();
    await fetchHolidays(curYear);
    render();
  }
});

function loadState(){
  try{const s=localStorage.getItem(NIPPO_KEY);if(s)return JSON.parse(s);}catch(e){}
  return{reports:{}};
}
function saveState(){try{localStorage.setItem(NIPPO_KEY,JSON.stringify(state));}catch(e){}}
function rk(y,m,d,n){return `${y}-${m+1}-${d}-${n}`;}
function getReport(y,m,d,n){
  const k=rk(y,m,d,n);
  if(!state.reports[k])state.reports[k]={tasks:[],memo:'',handovers:[],closed:false};
  return state.reports[k];
}

async function fetchHolidays(year){
  if(holidays[year])return;
  try{const r=await fetch(`https://holidays-jp.github.io/api/v1/${year}/date.json`);holidays[year]=r.ok?await r.json():{};}
  catch(e){holidays[year]={};}
}
function getHoliday(y,m,d){
  const h=holidays[y];if(!h)return null;
  return h[`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`]||null;
}
function isOffDay(y,m,d){const dow=new Date(y,m,d).getDay();return dow===0||dow===6||!!getHoliday(y,m,d);}

const TIME_OPTIONS=(()=>{const t=[];for(let h=0;h<24;h++)for(let mn=0;mn<60;mn+=5)t.push(`${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`);return t;})();
function calcMin(s,e){if(!s||!e)return null;const[sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);const d=(eh*60+em)-(sh*60+sm);return d>0?d:null;}
function fmtDur(min){if(!min)return null;if(min<60)return `${min}分`;const h=Math.floor(min/60),m=min%60;return m===0?`${h}時間`:`${h}時間${m}分`;}
function totalMin(tasks){return tasks.reduce((s,t)=>s+(calcMin(t.start,t.end)||0),0);}

// シフトからその日の予定時間を取得
function getShiftMinutes(y,m,d,name){
  try{
    const s=localStorage.getItem(SHIFT_KEY);if(!s)return null;
    const st=JSON.parse(s);
    const val=st.shifts[`${y}-${m+1}-${d}-${name}`];
    if(!val||val==='欠席')return null;
    const match=val.match(/^(\d{1,2})-(\d{1,2})$/);
    if(match)return(parseInt(match[2])-parseInt(match[1]))*60;
    if(val==='○'||val==='〇')return 480; // ○=8時間
    return null;
  }catch(e){return null;}
}

async function init(){
  // Firebase-readyイベントで初期化されるので、ここでは何もしない
  // すでにfirebase-readyが発火済みの場合に備えて
  if(window.firebaseUser && !curUser){
    const fbUser = window.firebaseUser;
    curUser = MEMBERS.find(m => m.name === fbUser.name) || {name: fbUser.name, dot: fbUser.dot||'#888', isAdmin: fbUser.isAdmin};
    viewMode = curUser.isAdmin ? 'all' : 'mine';
    const now = new Date();
    curYear = now.getFullYear(); curMonth = now.getMonth(); curDay = now.getDate();
    await fetchHolidays(curYear);
    render();
  }
}

function render(){
  if(!curUser){
    document.getElementById('app').innerHTML='<div style="padding:2rem;text-align:center;color:#aaa;">ログイン情報を確認中...</div>';
    return;
  }
  renderMain();
}

function logout(){
  window.firebaseLogout();
}

/* ===== メイン画面 ===== */
function renderMain(){
  const dn=['日','月','火','水','木','金','土'];
  const dow=new Date(curYear,curMonth,curDay).getDay();
  const hname=getHoliday(curYear,curMonth,curDay);
  const dowColor=(dow===0||hname)?'color:#e24b4a':dow===6?'color:#378ADD':'color:#888';

  const isAdmin=curUser.isAdmin;
  let html=`
    <div class="topbar">
      <div class="user-info">
        <div class="user-dot" style="background:${curUser.dot};"></div>
        <div class="user-name">${curUser.name}${isAdmin?' （管理者）':''}</div>
      </div>
      <div class="view-toggle">
        <button class="view-btn${viewMode==='mine'?' active':''}" onclick="setView('mine')">自分の日報</button>
        <button class="view-btn${viewMode==='all'?' active':''}" onclick="setView('all')">全員を見る</button>
      </div>
    </div>
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
      <span class="month-label" id="month-label">${curYear}年${curMonth+1}月</span>
      <button class="nav-btn" onclick="changeMonth(1)">▶</button>
      <button class="today-btn" onclick="goToday()">今日</button>
    </div>`;

  // カレンダー
  const dim=new Date(curYear,curMonth+1,0).getDate();
  html+=`<div class="cal-wrap"><div class="cal">`;
  for(let d=1;d<=dim;d++){
    const dow2=new Date(curYear,curMonth,d).getDay();
    const off=isOffDay(curYear,curMonth,d);
    const active=d===curDay;
    // 誰かの日報があるか
    const hasEntry=MEMBERS.some(mb=>{const r=state.reports[rk(curYear,curMonth,d,mb.name)];return r&&r.tasks.length>0;});
    const isClosed=viewMode==='mine'&&state.reports[rk(curYear,curMonth,d,curUser.name)]?.closed;
    html+=`<div class="cal-day${off?' offday':''}${active?' active':''}${hasEntry?' has-entry':''}${isClosed?' closed':''}" onclick="selectDay(${d})">
      <div class="cal-dn">${['日','月','火','水','木','金','土'][dow2]}</div>
      <div class="cal-dd">${d}</div>
    </div>`;
  }
  html+=`</div></div>`;

  // オフ日バナー
  if(isOffDay(curYear,curMonth,curDay)){
    html+=`<div class="offday-banner">土日・祝日${hname?'（'+hname+'）':''}です。記録は任意です。</div>`;
  }

  // コンテンツ
  if(viewMode==='all'){
    html+=`<div class="all-view" id="all-view"></div>`;
  }else{
    html+=`<div id="my-view"></div>`;
  }

  document.getElementById('app').innerHTML=html;

  if(viewMode==='all')renderAllView();
  else renderMyView();
}

function setView(mode){viewMode=mode;renderMain();}
function selectDay(d){curDay=d;renderMain();}
async function changeMonth(d){
  curMonth+=d;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  const dim=new Date(curYear,curMonth+1,0).getDate();
  if(curDay>dim)curDay=dim;
  await fetchHolidays(curYear);
  renderMain();
}
function goToday(){const now=new Date();curYear=now.getFullYear();curMonth=now.getMonth();curDay=now.getDate();renderMain();}

/* ===== 全員ビュー ===== */
function renderAllView(){
  const container=document.getElementById('all-view');
  if(!container)return;
  container.innerHTML=MEMBERS.map(mb=>{
    const r=getReport(curYear,curMonth,curDay,mb.name);
    const tot=totalMin(r.tasks);
    const shiftMin=getShiftMinutes(curYear,curMonth,curDay,mb.name);
    const isShort=shiftMin&&tot<shiftMin&&r.tasks.length>0;
    const canEdit=curUser.isAdmin||curUser.name===mb.name;

    let tasksHtml='';
    if(r.tasks.length===0){
      tasksHtml=`<div class="no-report">タスクなし</div>`;
    }else{
      tasksHtml=`<div class="task-head"><span>開始</span><span>終了</span><span>時間</span><span>内容</span></div>`+
        r.tasks.map(t=>{
          const dur=calcMin(t.start,t.end);
          const durHtml=dur?`<span class="dur-chip ${dur>=60?'dur-full':'dur-part'}">${fmtDur(dur)}</span>`:'<span style="color:#ccc;font-size:11px;">—</span>';
          return `<div class="task-row-view">
            <span class="time-text">${t.start||'—'}</span>
            <span class="time-text">${t.end||'—'}</span>
            ${durHtml}
            <span class="task-content">${esc(t.content)}</span>
          </div>`;
        }).join('');
    }

    const handoverHtml=r.handovers&&r.handovers.length>0
      ?r.handovers.filter(h=>h.task).map(h=>`<div class="handover-info">📋 引き継ぎ→${h.to}：${esc(h.task)}</div>`).join(''):'';
    const memoHtml=r.memo?`<div class="memo-view">📝 ${esc(r.memo)}</div>`:'';

    return `<div class="member-report-card">
      <div class="mrc-header">
        <div class="mrc-member">
          <div class="mrc-dot" style="background:${mb.dot};"></div>
          <div class="mrc-name">${mb.name}</div>
          ${isShort?`<span style="font-size:11px;color:#e24b4a;background:#fcebeb;border-radius:5px;padding:2px 7px;">⚠ 時間不足</span>`:''}
        </div>
        <div class="mrc-stats">
          <span>計 ${fmtDur(tot)||'—'}</span>
          ${shiftMin?`<span>シフト ${fmtDur(shiftMin)}</span>`:''}
          ${r.closed?`<span class="mrc-closed">✓ 締め済み</span>`:`<span class="mrc-open">未締め</span>`}
          ${canEdit?`<button style="font-size:11px;color:#888;background:none;border:0.5px solid rgba(0,0,0,0.13);border-radius:5px;padding:2px 8px;cursor:pointer;font-family:inherit;" onclick="editMember('${mb.name}')">編集</button>`:''}
        </div>
      </div>
      <div class="mrc-body">
        ${tasksHtml}
        ${handoverHtml}
        ${memoHtml}
      </div>
    </div>`;
  }).join('');
}

function editMember(name){
  viewMode='mine';
  const orig=curUser;
  if(curUser.isAdmin&&curUser.name!==name){
    // 管理者が他メンバーを編集
    curUser=MEMBERS.find(m=>m.name===name)||curUser;
    renderMyView();
    curUser=orig;
    // 一時的にそのメンバーの入力画面を表示
    curUser=MEMBERS.find(m=>m.name===name)||orig;
  }
  renderMain();
}

/* ===== 自分ビュー（入力） ===== */
function renderMyView(){
  const container=document.getElementById('my-view');
  if(!container)return;
  const r=getReport(curYear,curMonth,curDay,curUser.name);
  const tot=totalMin(r.tasks);
  const shiftMin=getShiftMinutes(curYear,curMonth,curDay,curUser.name);
  const isShort=shiftMin&&tot>0&&tot<shiftMin;
  const isOk=shiftMin&&tot>=shiftMin;

  const timeOpts=TIME_OPTIONS.map(t=>`<option value="${t}">${t}</option>`).join('');

  const taskRowsHtml=r.tasks.map((t,i)=>{
    const sOpts=TIME_OPTIONS.map(o=>`<option value="${o}"${o===t.start?' selected':''}>${o}</option>`).join('');
    const eOpts=TIME_OPTIONS.map(o=>`<option value="${o}"${o===t.end?' selected':''}>${o}</option>`).join('');
    const dur=calcMin(t.start,t.end);
    const durHtml=dur?`<span class="dur-chip ${dur>=60?'dur-full':'dur-part'}">${fmtDur(dur)}</span>`:'<span style="color:#ccc;font-size:11px;">—</span>';
    return `<div class="task-input-row">
      <select class="time-sel" onchange="updateTask(${i},'start',this.value)">${sOpts}</select>
      <select class="time-sel" onchange="updateTask(${i},'end',this.value)">${eOpts}</select>
      ${durHtml}
      <input class="task-text-input" type="text" value="${esc(t.content)}" placeholder="タスク内容" oninput="updateTask(${i},'content',this.value)">
      <button class="del-btn" onclick="deleteTask(${i})">×</button>
    </div>`;
  }).join('');

  const handoverRowsHtml=(r.handovers||[]).map((h,i)=>{
    const memberOpts=MEMBERS.filter(m=>m.name!==curUser.name).map(m=>`<option value="${m.name}"${m.name===h.to?' selected':''}>${m.name}</option>`).join('');
    return `<div class="handover-row" id="ho-row-${i}">
      <input class="handover-task-input" type="text" value="${esc(h.task||'')}" placeholder="引き継ぎ内容" oninput="updateHandover(${i},'task',this.value)">
      <select class="handover-to-select" onchange="updateHandover(${i},'to',this.value)">
        ${memberOpts}
      </select>
      <button class="del-btn" onclick="deleteHandover(${i})">×</button>
    </div>`;
  }).join('');

  const shiftBadge=shiftMin
    ?(isOk?`<span class="shift-ok">✓ ${fmtDur(tot)} / ${fmtDur(shiftMin)}</span>`
      :isShort?`<span class="shift-warn">⚠ ${fmtDur(tot)} / ${fmtDur(shiftMin)}（時間不足）</span>`
      :`<span class="shift-info">シフト: ${fmtDur(shiftMin)}</span>`)
    :'';

  const closeSection=r.closed
    ?`<div class="closed-badge">✓ 日報を締めました <button class="reopen-btn" onclick="reopenReport()">取り消す</button></div>`
    :`<div class="close-section">
        <button class="close-btn" onclick="closeReport()" ${r.tasks.length===0?'disabled':''}>
          退勤・日報を締める
        </button>
        ${r.tasks.length===0?'<div style="font-size:11px;color:#bbb;text-align:center;margin-top:6px;">タスクを1件以上入力してください</div>':''}
      </div>`;

  const dn=['日','月','火','水','木','金','土'];
  const dow=new Date(curYear,curMonth,curDay).getDay();
  const hname=getHoliday(curYear,curMonth,curDay);
  const dowColor=(dow===0||hname)?'color:#e24b4a':dow===6?'color:#378ADD':'color:#888';

  container.innerHTML=`<div class="my-card">
    <div class="my-card-header">
      <div class="my-date">${curYear}年${curMonth+1}月${curDay}日（<span style="${dowColor}">${dn[dow]}</span>${hname?'・'+hname:''}）</div>
      ${shiftBadge}
    </div>
    <div class="my-card-body">
      <div class="task-input-head"><span>開始</span><span>終了</span><span>時間</span><span>タスク内容</span><span></span></div>
      <div class="task-rows" id="task-rows">${taskRowsHtml}</div>
      <button class="add-task-btn" onclick="addTask()">＋ タスクを追加</button>

      <div class="handover-section">
        <div class="section-label-sm">未完了タスクの引き継ぎ</div>
        <div id="handover-rows">${handoverRowsHtml}</div>
        <button class="add-handover-btn" onclick="addHandover()">＋ 引き継ぎを追加</button>
      </div>

      <div style="margin-top:12px;">
        <div class="section-label-sm">メモ・特記事項</div>
        <textarea class="memo-input" placeholder="引き継ぎ事項など" oninput="updateMemo(this.value)">${esc(r.memo||'')}</textarea>
      </div>

      ${closeSection}
    </div>
  </div>`;
}

function addTask(){
  const r=getReport(curYear,curMonth,curDay,curUser.name);
  const last=r.tasks[r.tasks.length-1];
  const start=last?last.end:'09:00';
  const idx=TIME_OPTIONS.indexOf(start);
  const end=TIME_OPTIONS[Math.min(idx+2,TIME_OPTIONS.length-1)];
  r.tasks.push({start,end,content:''});
  saveState();renderMyView();
}
function deleteTask(i){
  const r=getReport(curYear,curMonth,curDay,curUser.name);
  r.tasks.splice(i,1);saveState();renderMyView();
}
function updateTask(i,field,val){
  const r=getReport(curYear,curMonth,curDay,curUser.name);
  r.tasks[i][field]=val;saveState();
  if(field==='start'||field==='end')renderMyView();
}
function addHandover(){
  const r=getReport(curYear,curMonth,curDay,curUser.name);
  if(!r.handovers)r.handovers=[];
  const otherMember=MEMBERS.find(m=>m.name!==curUser.name);
  r.handovers.push({task:'',to:otherMember?otherMember.name:''});
  saveState();renderMyView();
}
function deleteHandover(i){
  const r=getReport(curYear,curMonth,curDay,curUser.name);
  r.handovers.splice(i,1);saveState();renderMyView();
}
function updateHandover(i,field,val){
  const r=getReport(curYear,curMonth,curDay,curUser.name);
  r.handovers[i][field]=val;saveState();
}
function updateMemo(val){
  const r=getReport(curYear,curMonth,curDay,curUser.name);
  r.memo=val;saveState();
}

/* ===== 日報締め ===== */
function closeReport(){
  const r=getReport(curYear,curMonth,curDay,curUser.name);
  if(r.tasks.length===0){showToast('タスクを1件以上入力してください');return;}
  r.closed=true;saveState();

  // ChatWork用テキスト生成
  const now=new Date();
  const tot=totalMin(r.tasks);
  const dn=['日','月','火','水','木','金','土'];
  const dow=new Date(curYear,curMonth,curDay).getDay();
  let text=`【退勤報告】${curUser.name}\n`;
  text+=`${curYear}/${curMonth+1}/${curDay}（${dn[dow]}）\n`;
  text+=`勤務時間：${fmtDur(tot)||'—'}\n`;
  if(r.handovers&&r.handovers.filter(h=>h.task).length>0){
    text+=`\n■ 引き継ぎ\n`;
    r.handovers.filter(h=>h.task).forEach(h=>{text+=`→${h.to}：${h.task}\n`;});
  }
  if(r.memo){text+=`\n■ 備考\n${r.memo}\n`;}
  text+=`\nお疲れ様でした！`;

  document.getElementById('cw-text').value=text;
  document.getElementById('cw-modal').classList.add('open');
  renderMyView();renderAllView();
}
function reopenReport(){
  const r=getReport(curYear,curMonth,curDay,curUser.name);
  r.closed=false;saveState();renderMyView();
}
function closeCwModal(){document.getElementById('cw-modal').classList.remove('open');}
function copyCwText(){
  const text=document.getElementById('cw-text').value;
  navigator.clipboard.writeText(text).then(()=>{showToast('コピーしました！ChatWorkに貼り付けてください');closeCwModal();}).catch(()=>showToast('コピーに失敗しました'));
}

document.getElementById('cw-modal').addEventListener('click',function(e){if(e.target===this)closeCwModal();});

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
init();
</script>
</div>
</body>
</html>
