<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カレンダー — サポートチーム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;}
.container{max-width:1400px;margin:0 auto;padding:1.5rem 2rem;}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#888;text-decoration:none;background:#f0f0eb;border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;padding:5px 12px;margin-bottom:1rem;}
h1{font-size:20px;font-weight:500;color:#1a1a1a;margin-bottom:1.25rem;}

/* トップバー */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px;}
.month-nav{display:flex;align-items:center;gap:10px;}
.month-title{font-size:18px;font-weight:500;color:#1a1a1a;min-width:130px;text-align:center;}
.nav-btn{background:#f0f0eb;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:5px 14px;cursor:pointer;font-size:13px;color:#1a1a1a;}
.nav-btn:hover{background:#e5e5e0;}
.today-btn{background:#fff;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:5px 14px;cursor:pointer;font-size:13px;color:#1a1a1a;}
.today-btn:hover{background:#f5f5f0;}
.right-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.member-filter{padding:5px 10px;border-radius:20px;border:0.5px solid rgba(0,0,0,0.13);background:#fff;font-size:12px;cursor:pointer;color:#1a1a1a;font-family:inherit;outline:none;}
.add-event-btn{background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:6px 16px;cursor:pointer;font-size:13px;font-family:inherit;}
.add-event-btn:hover{background:#333;}

/* 凡例 */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#888;}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

/* カレンダー本体 */
.cal-wrap{background:#fff;border-radius:14px;border:0.5px solid rgba(0,0,0,0.1);overflow:hidden;}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:0.5px solid rgba(0,0,0,0.08);}
.cal-header div{text-align:center;padding:10px 0;font-size:12px;font-weight:500;color:#888;}
.cal-header .sun{color:#e24b4a;}
.cal-header .sat{color:#378ADD;}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-cell{min-height:120px;border-right:0.5px solid rgba(0,0,0,0.06);border-bottom:0.5px solid rgba(0,0,0,0.06);padding:5px 4px;position:relative;cursor:pointer;}
.cal-cell:hover{background:#fafafa;}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell.offday{background:rgba(0,0,0,0.025);}
.cal-cell.other-month{background:#fafafa;}
.cal-cell.other-month .cell-num{color:#ddd;}
.cell-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.cell-num{width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:#1a1a1a;border-radius:50%;}
.cell-num.today-num{background:#1a1a1a;color:#fff;}
.cell-num.sat-num{color:#378ADD;}
.cell-num.sun-num{color:#e24b4a;}
.cell-num.offday-num{color:#bbb;}
.holiday-name{font-size:9px;color:#e24b4a;flex:1;margin-left:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cell-add{display:none;background:none;border:none;cursor:pointer;color:#bbb;font-size:18px;line-height:1;padding:0;}
.cal-cell:hover .cell-add{display:block;}
.cell-events{display:flex;flex-direction:column;gap:2px;}
.event-chip{border-radius:4px;padding:2px 6px;font-size:10px;cursor:pointer;display:flex;align-items:center;gap:3px;line-height:1.4;transition:opacity 0.1s;}
.event-chip:hover{opacity:0.8;}
.event-chip.type-event{background:#eef4fb;color:#185fa5;border-left:3px solid #378ADD;}
.event-chip.type-task{border-left:3px solid #ccc;}
.event-chip.done{opacity:0.35;text-decoration:line-through;}
.event-chip .chip-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.event-chip .chip-time{font-size:9px;opacity:0.7;flex-shrink:0;}
.cell-more{font-size:10px;color:#aaa;padding:1px 4px;cursor:pointer;}

/* 詳細ポップアップ */
.popup-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.15);z-index:100;align-items:center;justify-content:center;}
.popup-bg.open{display:flex;}
.popup{background:#fff;border-radius:14px;border:0.5px solid rgba(0,0,0,0.1);padding:1.5rem;width:100%;max-width:380px;margin:1rem;max-height:80vh;overflow-y:auto;}
.popup-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.popup-date{font-size:15px;font-weight:500;color:#1a1a1a;}
.popup-close{background:none;border:none;cursor:pointer;font-size:18px;color:#aaa;}
.popup-close:hover{color:#1a1a1a;}
.popup-events{display:flex;flex-direction:column;gap:8px;}
.popup-event{border-radius:10px;border:0.5px solid rgba(0,0,0,0.1);padding:10px 12px;}
.popup-event.type-event{border-left:3px solid #378ADD;}
.popup-event.type-task{border-left:3px solid #ccc;}
.popup-event-title{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:3px;}
.popup-event.done .popup-event-title{text-decoration:line-through;color:#aaa;}
.popup-event-meta{display:flex;gap:6px;flex-wrap:wrap;}
.pmeta{font-size:11px;border-radius:5px;padding:2px 7px;background:#f0f0eb;color:#888;}
.popup-empty{text-align:center;padding:1rem;font-size:13px;color:#bbb;}
.popup-add-btn{width:100%;margin-top:10px;background:transparent;border:0.5px dashed rgba(0,0,0,0.15);border-radius:8px;padding:8px;font-size:13px;cursor:pointer;color:#888;font-family:inherit;}
.popup-add-btn:hover{background:#f5f5f0;}

/* イベント登録・編集モーダル */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.25);z-index:200;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:14px;border:0.5px solid rgba(0,0,0,0.1);padding:1.5rem;width:100%;max-width:460px;margin:1rem;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:500;margin-bottom:1.25rem;color:#1a1a1a;}
.form-row{margin-bottom:12px;}
.form-label{font-size:11px;color:#aaa;margin-bottom:4px;}
.form-input{width:100%;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:8px 10px;font-size:13px;color:#1a1a1a;background:#fff;font-family:inherit;outline:none;}
.form-input:focus{border-color:#378ADD;}
.form-select{width:100%;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:8px 10px;font-size:13px;color:#1a1a1a;background:#fff;font-family:inherit;outline:none;}
.form-select:focus{border-color:#378ADD;}
.form-textarea{width:100%;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:8px 10px;font-size:13px;color:#1a1a1a;background:#fff;font-family:inherit;outline:none;resize:vertical;min-height:60px;}
.form-textarea:focus{border-color:#378ADD;}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.modal-actions{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;}
.btn-del{background:none;border:none;cursor:pointer;font-size:12px;color:#ccc;font-family:inherit;}
.btn-del:hover{color:#e24b4a;}
.modal-right{display:flex;gap:8px;}
.btn-cancel{background:transparent;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:#888;font-family:inherit;}
.btn-save{background:#1a1a1a;border:none;border-radius:8px;padding:6px 16px;cursor:pointer;font-size:13px;color:#fff;font-family:inherit;}
.btn-save:hover{background:#333;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#fff;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:8px 18px;font-size:13px;color:#1a1a1a;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:300;white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,0,0.1);}
.toast.show{opacity:1;}

/* フィルターバー */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap;padding:10px 14px;background:#fff;border-radius:12px;border:0.5px solid rgba(0,0,0,0.08);}
.filter-section{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.filter-label{font-size:11px;color:#aaa;white-space:nowrap;}
.filter-sep{width:0.5px;height:20px;background:rgba(0,0,0,0.1);margin:0 4px;}
.fchip{padding:4px 10px;border-radius:20px;border:0.5px solid rgba(0,0,0,0.13);background:#f8f8f5;font-size:11px;cursor:pointer;color:#888;font-family:inherit;transition:all 0.1s;display:inline-flex;align-items:center;gap:4px;}
.fchip:hover{background:#f0f0eb;}
.fchip.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.filter-chips{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.color-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.filter-reset{font-size:11px;color:#aaa;background:none;border:none;cursor:pointer;font-family:inherit;margin-left:auto;white-space:nowrap;padding:4px 8px;border-radius:6px;}
.filter-reset:hover{color:#1a1a1a;background:#f0f0eb;}
</style>
</head>
<body>
<div class="container">
  <a class="back-btn" href="ホーム.html">◀ ホームに戻る</a>
  <h1>カレンダー <span style="font-size:13px;color:#888;font-weight:400;">サポートチーム</span></h1>

  <div class="topbar">
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
      <span class="month-title" id="month-title"></span>
      <button class="nav-btn" onclick="changeMonth(1)">▶</button>
      <button class="today-btn" onclick="goToday()">今日</button>
    </div>
    <div class="right-bar">
      <button class="add-event-btn" onclick="openNewEvent(null)">＋ 予定を追加</button>
    </div>
  </div>

  <!-- フィルターバー -->
  <div class="filter-bar">
    <span class="filter-label">種別</span>
    <div class="filter-chips" id="filter-type">
      <button class="fchip active" data-type="all" onclick="setTypeFilter('all')">すべて</button>
      <button class="fchip" data-type="event" onclick="setTypeFilter('event')">🗓 予定</button>
      <button class="fchip" data-type="task" onclick="setTypeFilter('task')">✅ タスク</button>
    </div>
    <div class="filter-sep"></div>
    <span class="filter-label">担当者</span>
    <div class="filter-chips" id="filter-member"></div>
    <div class="filter-sep"></div>
    <span class="filter-label">色</span>
    <div class="filter-chips" id="filter-color">
      <button class="fchip active" data-color="all" onclick="setColorFilter('all')">すべて</button>
      <button class="fchip color-chip" data-color="blue" onclick="setColorFilter('blue')"><span class="color-dot" style="background:#378ADD;"></span>青</button>
      <button class="fchip color-chip" data-color="green" onclick="setColorFilter('green')"><span class="color-dot" style="background:#3b9e5a;"></span>緑</button>
      <button class="fchip color-chip" data-color="red" onclick="setColorFilter('red')"><span class="color-dot" style="background:#e24b4a;"></span>赤</button>
      <button class="fchip color-chip" data-color="yellow" onclick="setColorFilter('yellow')"><span class="color-dot" style="background:#f5c518;"></span>黄</button>
      <button class="fchip color-chip" data-color="purple" onclick="setColorFilter('purple')"><span class="color-dot" style="background:#7f77dd;"></span>紫</button>
      <button class="fchip color-chip" data-color="orange" onclick="setColorFilter('orange')"><span class="color-dot" style="background:#ff7f2a;"></span>橙</button>
    </div>
    <button class="filter-reset" onclick="resetFilters()">リセット</button>
  </div>

  <div class="legend" id="legend"></div>

  <div class="cal-wrap">
    <div class="cal-header">
      <div class="sun">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="sat">土</div>
    </div>
    <div class="cal-body" id="cal-body"></div>
  </div>
</div>

<!-- 日付クリックポップアップ -->
<div class="popup-bg" id="popup-bg">
  <div class="popup">
    <div class="popup-header">
      <div class="popup-date" id="popup-date"></div>
      <button class="popup-close" onclick="closePopup()">×</button>
    </div>
    <div class="popup-events" id="popup-events"></div>
    <button class="popup-add-btn" id="popup-add-btn">＋ この日に予定を追加</button>
  </div>
</div>

<!-- イベント追加・編集モーダル -->
<div class="modal-bg" id="event-modal-bg">
  <div class="modal">
    <div class="modal-title" id="event-modal-title">予定を追加</div>
    <div class="form-row">
      <div class="form-label">タイトル</div>
      <input class="form-input" id="e-title" placeholder="予定のタイトル">
    </div>
    <div class="form-row-2">
      <div>
        <div class="form-label">日付</div>
        <input class="form-input" id="e-date" type="date">
      </div>
      <div>
        <div class="form-label">担当者</div>
        <select class="form-select" id="e-member"></select>
      </div>
    </div>
    <div class="form-row-2">
      <div>
        <div class="form-label">開始時刻（任意）</div>
        <input class="form-input" id="e-start" type="time">
      </div>
      <div>
        <div class="form-label">終了時刻（任意）</div>
        <input class="form-input" id="e-end" type="time">
      </div>
    </div>
    <div class="form-row">
      <div class="form-label">色</div>
      <select class="form-select" id="e-color">
        <option value="blue">青（デフォルト）</option>
        <option value="green">緑</option>
        <option value="red">赤</option>
        <option value="yellow">黄</option>
        <option value="purple">紫</option>
        <option value="orange">オレンジ</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-label">メモ</div>
      <textarea class="form-textarea" id="e-memo" placeholder="詳細・備考など"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-del" id="e-del-btn" style="visibility:hidden;" onclick="deleteEvent()">削除</button>
      <div class="modal-right">
        <button class="btn-cancel" onclick="closeEventModal()">キャンセル</button>
        <button class="btn-save" onclick="saveEvent()">保存</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const EVENT_KEY='cal_events_v1';
const TASK_KEY='tasks_v1';
const MEMBERS=[
  {name:'植田',dot:'#b0b0b0'},
  {name:'菅原',dot:'#e91e8c'},
  {name:'吉崎',dot:'#378ADD'},
  {name:'本郷',dot:'#f5c518'},
  {name:'山口',dot:'#ff7f2a'},
  {name:'鈴木',dot:'#3b9e5a'},
  {name:'サポートチーム',dot:'#7f77dd'},
];
const COLOR_MAP={
  blue:{bg:'#eef4fb',border:'#378ADD',text:'#185fa5'},
  green:{bg:'#eaf3de',border:'#3b9e5a',text:'#3b6d11'},
  red:{bg:'#fcebeb',border:'#e24b4a',text:'#a32d2d'},
  yellow:{bg:'#fef9e0',border:'#f5c518',text:'#7a6000'},
  purple:{bg:'#eeedfe',border:'#7f77dd',text:'#534ab7'},
  orange:{bg:'#fff0e0',border:'#ff7f2a',text:'#8a3a00'},
};

let curYear,curMonth;
let holidays={};
let editingEventId=null;
let popupDateStr=null;
let filterType='all';   // 'all'|'event'|'task'
let filterMember='all'; // 'all'|メンバー名
let filterColor='all';  // 'all'|色名

function setTypeFilter(v){
  filterType=v;
  document.querySelectorAll('#filter-type .fchip').forEach(b=>b.classList.toggle('active',b.dataset.type===v));
  render();
}
function setMemberFilter(v){
  filterMember=v;
  document.querySelectorAll('#filter-member .fchip').forEach(b=>b.classList.toggle('active',b.dataset.member===v));
  render();
}
function setColorFilter(v){
  filterColor=v;
  document.querySelectorAll('#filter-color .fchip').forEach(b=>b.classList.toggle('active',b.dataset.color===v));
  render();
}
function resetFilters(){
  filterType='all';filterMember='all';filterColor='all';
  document.querySelectorAll('#filter-type .fchip').forEach(b=>b.classList.toggle('active',b.dataset.type==='all'));
  document.querySelectorAll('#filter-member .fchip').forEach(b=>b.classList.toggle('active',b.dataset.member==='all'));
  document.querySelectorAll('#filter-color .fchip').forEach(b=>b.classList.toggle('active',b.dataset.color==='all'));
  render();
}

function loadEvents(){
  try{const s=localStorage.getItem(EVENT_KEY);return s?JSON.parse(s):[];}catch(e){return [];}
}
function saveEvents(evs){try{localStorage.setItem(EVENT_KEY,JSON.stringify(evs));}catch(e){}}
function loadTasks(){
  try{const s=localStorage.getItem(TASK_KEY);return s?JSON.parse(s).tasks||[]:[]; }catch(e){return [];}
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

async function fetchHolidays(year){
  if(holidays[year])return;
  try{const r=await fetch(`https://holidays-jp.github.io/api/v1/${year}/date.json`);holidays[year]=r.ok?await r.json():{};}
  catch(e){holidays[year]={};}
}
function getHoliday(y,m,d){
  const h=holidays[y];if(!h)return null;
  return h[`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`]||null;
}
function isOffDay(y,m,d){
  const dow=new Date(y,m,d).getDay();return dow===0||dow===6||!!getHoliday(y,m,d);
}
function fmtDate(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}

async function init(){
  const now=new Date();curYear=now.getFullYear();curMonth=now.getMonth();

  // メンバーフィルターチップ生成
  const mf=document.getElementById('filter-member');
  let mfHtml=`<button class="fchip active" data-member="all" onclick="setMemberFilter('all')">全員</button>`;
  MEMBERS.forEach(m=>{
    mfHtml+=`<button class="fchip color-chip" data-member="${m.name}" onclick="setMemberFilter('${m.name}')"><span class="color-dot" style="background:${m.dot};"></span>${m.name}</button>`;
  });
  mf.innerHTML=mfHtml;

  // イベント追加モーダルのメンバーselect
  const fsel=document.getElementById('e-member');
  fsel.innerHTML='<option value="all">全員</option>';
  MEMBERS.forEach(m=>{const o=document.createElement('option');o.value=m.name;o.textContent=m.name;fsel.appendChild(o);});

  await fetchHolidays(curYear);
  render();
}
function goToday(){const now=new Date();curYear=now.getFullYear();curMonth=now.getMonth();fetchHolidays(curYear).then(render);}
async function changeMonth(d){
  curMonth+=d;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  await fetchHolidays(curYear);render();
}

function render(){
  document.getElementById('month-title').textContent=`${curYear}年${curMonth+1}月`;

  // フィルター適用
  let allEvents=loadEvents();
  let allTasks=loadTasks().filter(t=>t.showInCal!==false);

  // 担当者フィルター
  if(filterMember!=='all'){
    allEvents=allEvents.filter(e=>e.member===filterMember||e.member==='all');
    allTasks=allTasks.filter(t=>t.member===filterMember);
  }
  // 色フィルター（イベントのみ）
  if(filterColor!=='all'){
    allEvents=allEvents.filter(e=>(e.color||'blue')===filterColor);
    if(filterType!=='event') allTasks=[]; // 色フィルター時タスクは非表示（色概念なし）
  }
  // 種別フィルター
  if(filterType==='event') allTasks=[];
  if(filterType==='task') allEvents=[];

  const now=new Date();
  const todayStr=fmtDate(now.getFullYear(),now.getMonth(),now.getDate());
  const firstDow=new Date(curYear,curMonth,1).getDay();
  const dim=new Date(curYear,curMonth+1,0).getDate();
  const prevDim=new Date(curYear,curMonth,0).getDate();
  const total=Math.ceil((firstDow+dim)/7)*7;
  const body=document.getElementById('cal-body');
  body.innerHTML='';

  for(let i=0;i<total;i++){
    let y=curYear,m=curMonth,d,other=false;
    if(i<firstDow){d=prevDim-(firstDow-1-i);m=curMonth-1;if(m<0){m=11;y--;}other=true;}
    else if(i-firstDow>=dim){d=i-firstDow-dim+1;m=curMonth+1;if(m>11){m=0;y++;}other=true;}
    else{d=i-firstDow+1;}
    const dow=new Date(y,m,d).getDay();
    const isSat=dow===6,isSun=dow===0;
    const hname=other?null:getHoliday(y,m,d);
    const off=!other&&(isSun||isSat||!!hname);
    const dateStr=fmtDate(y,m,d);
    const isToday=dateStr===todayStr;

    // その日のイベント＋タスク
    const dayEvents=other?[]:allEvents.filter(e=>e.date===dateStr).sort((a,b)=>(a.startTime||'').localeCompare(b.startTime||''));
    const dayTasks=other?[]:allTasks.filter(t=>t.due===dateStr);

    let numCls='cell-num';
    if(isToday)numCls+=' today-num';
    else if(other)numCls+=' offday-num';
    else if(isSun||hname)numCls+=' sun-num';
    else if(isSat)numCls+=' sat-num';

    const cell=document.createElement('div');
    cell.className='cal-cell'+(other?' other-month':off?' offday':'');

    const allItems=[
      ...dayEvents.map(e=>({type:'event',data:e})),
      ...dayTasks.map(t=>({type:'task',data:t}))
    ];

    let html=`<div class="cell-top">
      <div class="${numCls}">${d}</div>
      ${hname?`<div class="holiday-name">${hname}</div>`:''}
      ${!other?`<button class="cell-add" onclick="event.stopPropagation();openNewEvent('${dateStr}')">+</button>`:''}
    </div><div class="cell-events">`;

    const show=allItems.slice(0,3);
    show.forEach(item=>{
      if(item.type==='event'){
        const e=item.data;
        const clr=COLOR_MAP[e.color||'blue'];
        const mb=MEMBERS.find(m=>m.name===e.member);
        const timeStr=e.startTime?e.startTime.slice(0,5):'';
        html+=`<div class="event-chip type-event" style="background:${clr.bg};color:${clr.text};border-left-color:${clr.border};" onclick="event.stopPropagation();openEditEvent('${e.id}')">
          ${mb?`<span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${mb.dot};flex-shrink:0;"></span>`:''}
          <span class="chip-text">${esc(e.title)}</span>
          ${timeStr?`<span class="chip-time">${timeStr}</span>`:''}
        </div>`;
      }else{
        const t=item.data;
        const mb=MEMBERS.find(m=>m.name===t.member)||{dot:'#ccc'};
        html+=`<div class="event-chip type-task${t.status==='done'?' done':''}" style="background:${mb.dot}18;color:${mb.dot};border-left-color:${mb.dot};" onclick="event.stopPropagation();openPopup('${dateStr}')">
          <span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${mb.dot};flex-shrink:0;"></span>
          <span class="chip-text">${esc(t.title)}</span>
        </div>`;
      }
    });
    if(allItems.length>3)html+=`<div class="cell-more" onclick="event.stopPropagation();openPopup('${dateStr}')">他${allItems.length-3}件</div>`;
    html+=`</div>`;
    cell.innerHTML=html;
    if(!other)cell.addEventListener('click',()=>openPopup(dateStr));
    body.appendChild(cell);
  }

  // 凡例
  const legend=document.getElementById('legend');
  legend.innerHTML='<div class="legend-item"><div class="legend-dot" style="background:#eef4fb;border:1px solid #378ADD;"></div>予定</div><div class="legend-item"><div class="legend-dot" style="background:#f0f0f0;border:1px solid #ccc;"></div>タスク期日</div>';
  MEMBERS.forEach(mb=>{
    const div=document.createElement('div');div.className='legend-item';
    div.innerHTML=`<div class="legend-dot" style="background:${mb.dot}25;border:1px solid ${mb.dot};"></div>${mb.name}`;
    legend.appendChild(div);
  });
}

function openPopup(dateStr){
  popupDateStr=dateStr;
  const [y,m,d]=dateStr.split('-').map(Number);
  const dn=['日','月','火','水','木','金','土'];
  const dow=new Date(y,m-1,d).getDay();
  const hname=getHoliday(y,m-1,d);
  const dowColor=(dow===0||hname)?'color:#e24b4a':dow===6?'color:#378ADD':'color:#1a1a1a';
  document.getElementById('popup-date').innerHTML=`${y}年${m}月${d}日（<span style="${dowColor}">${dn[dow]}</span>${hname?'・'+hname:''}）`;

  const dayEvents=loadEvents().filter(e=>e.date===dateStr&&(filterMember==='all'||e.member===filterMember||e.member==='all')).sort((a,b)=>(a.startTime||'').localeCompare(b.startTime||''));
  const dayTasks=loadTasks().filter(t=>t.showInCal!==false&&t.due===dateStr&&(filterMember==='all'||t.member===filterMember));

  const cont=document.getElementById('popup-events');
  if(dayEvents.length===0&&dayTasks.length===0){
    cont.innerHTML='<div class="popup-empty">予定・タスクなし</div>';
  }else{
    cont.innerHTML=[
      ...dayEvents.map(e=>{
        const clr=COLOR_MAP[e.color||'blue'];
        const mb=MEMBERS.find(m=>m.name===e.member);
        const timeStr=e.startTime?(e.endTime?`${e.startTime}〜${e.endTime}`:e.startTime):'';
        return `<div class="popup-event type-event" style="border-left-color:${clr.border};">
          <div class="popup-event-title">${esc(e.title)}</div>
          <div class="popup-event-meta">
            ${timeStr?`<span class="pmeta" style="background:${clr.bg};color:${clr.text};">${timeStr}</span>`:''}
            ${mb?`<span class="pmeta" style="background:${mb.dot}22;color:${mb.dot};">${e.member}</span>`:''}
          </div>
          ${e.memo?`<div style="font-size:11px;color:#888;margin-top:5px;">${esc(e.memo)}</div>`:''}
          <button style="font-size:10px;color:#aaa;background:none;border:none;cursor:pointer;margin-top:4px;padding:0;" onclick="openEditEvent('${e.id}')">編集</button>
        </div>`;
      }),
      ...dayTasks.map(t=>{
        const mb=MEMBERS.find(m=>m.name===t.member)||{dot:'#ccc'};
        const priLbl={high:'高',mid:'中',low:'低'}[t.priority]||'';
        return `<div class="popup-event type-task${t.status==='done'?' done':''}">
          <div class="popup-event-title">${esc(t.title)}</div>
          <div class="popup-event-meta">
            <span class="pmeta" style="background:${mb.dot}22;color:${mb.dot};">${t.member}</span>
            ${priLbl?`<span class="pmeta">優先度：${priLbl}</span>`:''}
            <span class="pmeta">${{todo:'未着手',inprogress:'進行中',review:'レビュー待ち',done:'完了'}[t.status]||''}</span>
          </div>
        </div>`;
      })
    ].join('');
  }
  document.getElementById('popup-add-btn').onclick=()=>{closePopup();openNewEvent(dateStr);};
  document.getElementById('popup-bg').classList.add('open');
}
function closePopup(){document.getElementById('popup-bg').classList.remove('open');popupDateStr=null;}

function openNewEvent(dateStr){
  editingEventId=null;
  document.getElementById('event-modal-title').textContent='予定を追加';
  document.getElementById('e-del-btn').style.visibility='hidden';
  document.getElementById('e-title').value='';
  document.getElementById('e-date').value=dateStr||'';
  document.getElementById('e-member').value='all';
  document.getElementById('e-start').value='';
  document.getElementById('e-end').value='';
  document.getElementById('e-color').value='blue';
  document.getElementById('e-memo').value='';
  document.getElementById('event-modal-bg').classList.add('open');
  setTimeout(()=>document.getElementById('e-title').focus(),50);
}
function openEditEvent(id){
  closePopup();
  const evs=loadEvents();
  const e=evs.find(e=>e.id===id);if(!e)return;
  editingEventId=id;
  document.getElementById('event-modal-title').textContent='予定を編集';
  document.getElementById('e-del-btn').style.visibility='visible';
  document.getElementById('e-title').value=e.title||'';
  document.getElementById('e-date').value=e.date||'';
  document.getElementById('e-member').value=e.member||'all';
  document.getElementById('e-start').value=e.startTime||'';
  document.getElementById('e-end').value=e.endTime||'';
  document.getElementById('e-color').value=e.color||'blue';
  document.getElementById('e-memo').value=e.memo||'';
  document.getElementById('event-modal-bg').classList.add('open');
}
function closeEventModal(){document.getElementById('event-modal-bg').classList.remove('open');editingEventId=null;}

function saveEvent(){
  const title=document.getElementById('e-title').value.trim();
  if(!title){showToast('タイトルを入力してください');return;}
  const evs=loadEvents();
  const data={
    title,
    date:document.getElementById('e-date').value,
    member:document.getElementById('e-member').value,
    startTime:document.getElementById('e-start').value,
    endTime:document.getElementById('e-end').value,
    color:document.getElementById('e-color').value,
    memo:document.getElementById('e-memo').value.trim(),
  };
  if(editingEventId){
    const idx=evs.findIndex(e=>e.id===editingEventId);
    if(idx>=0)evs[idx]={...evs[idx],...data};
  }else{
    evs.push({id:uid(),...data,createdAt:new Date().toISOString()});
  }
  saveEvents(evs);closeEventModal();render();
  showToast(editingEventId?'予定を更新しました':'予定を追加しました');
}
function deleteEvent(){
  if(!editingEventId)return;
  if(!confirm('この予定を削除しますか？'))return;
  const evs=loadEvents().filter(e=>e.id!==editingEventId);
  saveEvents(evs);closeEventModal();render();
  showToast('予定を削除しました');
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
document.getElementById('popup-bg').addEventListener('click',function(e){if(e.target===this)closePopup();});
document.getElementById('event-modal-bg').addEventListener('click',function(e){if(e.target===this)closeEventModal();});

init();
</script>
</body>
</html>
