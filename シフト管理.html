<style>

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;}

.members-bar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}

.day-num{font-size:14px;font-weight:500;color:#1a1a1a;min-width:22px;}

.today-marker{display:inline-block;width:6px;height:6px;border-radius:50%;background:#378ADD;vertical-align:middle;}

.row-sun{background:rgba(0,0,0,0.06);}

/* シフト入力欄 — クラスひとつで色が決まる。styleで上書きしない */
.si{width:70px;border:1px solid rgba(0,0,0,0.15);border-radius:8px;padding:4px 5px;font-size:12px;text-align:center;background:#fff;color:#1a1a1a;font-family:inherit;outline:none;}
.si:focus{border-color:#378ADD;}

.si.part{background:#fef9e0 !important;border-color:#f5c518 !important;color:#7a6000 !important;}

.si.bad {background:#fff    !important;border-color:#e24b4a !important;color:#1a1a1a !important;}

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, updatePassword, reauthenticateWithCredential, EmailAuthProvider, browserLocalPersistence, setPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  const firebaseConfig = {
  apiKey: "AIzaSyBYqng6-vn341KhqtyjjdIJKbxN8J__ndQ",
  authDomain: "support-team-hub.firebaseapp.com",
  projectId: "support-team-hub",
  storageBucket: "support-team-hub.firebasestorage.app",
  messagingSenderId: "698402996312",
  appId: "1:698402996312:web:7ceec4c0e7fe15ce2cca2d"
};
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const ADMIN_EMAILS = ["suzuki@support.com"];

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('firebase-login-screen').style.display = 'none';
      document.getElementById('firebase-app-content').style.display = 'block';
      const isAdmin = ADMIN_EMAILS.includes(user.email);
      window.firebaseUser = { email: user.email, isAdmin };
      window.dispatchEvent(new Event('firebase-ready'));
    } else {
      document.getElementById('firebase-login-screen').style.display = 'flex';
      document.getElementById('firebase-app-content').style.display = 'none';
    }
  });

  window.firebaseLogin = async function() {
    const email = document.getElementById('fb-email').value.trim();
    const password = document.getElementById('fb-password').value;
    const errEl = document.getElementById('fb-error');
    errEl.textContent = '';
    try {
      await setPersistence(auth, browserLocalPersistence);
      await signInWithEmailAndPassword(auth, email, password);
    } catch(e) {
      errEl.textContent = 'メアドまたはパスワードが違います';
    }
  };

  window.firebaseLogout = async function() {
    await signOut(auth);
  };

  window.firebaseChangePassword = async function() {
    const current = document.getElementById('pw-current').value;
    const newpw = document.getElementById('pw-new').value;
    const confirm = document.getElementById('pw-confirm').value;
    const errEl = document.getElementById('pw-error');
    errEl.textContent = '';
    if(newpw !== confirm){ errEl.textContent = '新しいパスワードが一致しません'; return; }
    if(newpw.length < 6){ errEl.textContent = 'パスワードは6文字以上にしてください'; return; }
    try {
      const user = auth.currentUser;
      const credential = EmailAuthProvider.credential(user.email, current);
      await reauthenticateWithCredential(user, credential);
      await updatePassword(user, newpw);
      document.getElementById('pw-success').textContent = 'パスワードを変更しました！';
      document.getElementById('pw-current').value = '';
      document.getElementById('pw-new').value = '';
      document.getElementById('pw-confirm').value = '';
    } catch(e) {
      errEl.textContent = '現在のパスワードが違います';
    }
  };

  document.addEventListener('keydown', function(e) {
    if(e.key === 'Enter' && document.getElementById('firebase-login-screen').style.display !== 'none') {
      window.firebaseLogin();
    }
  });
</script>

<script>
const STORAGE_KEY = 'shiftapp_v5'; // 既存データを引き継ぐ

const TEAM_COLORS = {
  '植田': {dot:'#b0b0b0', bg:'#f5f5f5'},
  '菅原': {dot:'#e91e8c', bg:'#fde8f3'},
  '本郷': {dot:'#f5c518', bg:'#fef9e0'},
  '山口': {dot:'#ff7f2a', bg:'#fff0e0'},
};
const DEFAULT_COLORS = ['#6c8ebf','#82b366','#9673a6','#ae4132','#00838f'];

function getMemberColor(name, idx) {
  if (TEAM_COLORS[name]) return TEAM_COLORS[name];
  const hex = (state.memberColors && state.memberColors[name]) ? state.memberColors[name] : DEFAULT_COLORS[idx % DEFAULT_COLORS.length];
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return {dot: hex, bg: `rgba(${r},${g},${b},0.12)`};
}

// ○と△の判定（文字コードのブレに対応するため複数方式で判定）
function isCircle(v) {
  if (!v || v.length !== 1) return false;
  const code = v.charCodeAt(0);
  // ○(U+25CB), 〇(U+3007), ◯(U+25EF), Ｏ(U+FF2F), o(U+006F), O(U+004F)
  return code===0x25CB || code===0x3007 || code===0x25EF || code===0xFF2F || code===0x006F || code===0x004F;
}
function isTriangle(v) {
  if (!v || v.length !== 1) return false;
  const code = v.charCodeAt(0);
  // △(U+25B3), ▲(U+25B2)
  return code===0x25B3 || code===0x25B2;
}

// 値からステータスを返す: 'full' | 'part' | 'off' | 'bad' | ''
function getStatus(val) {
  if (!val) return '';
  if (val === '欠席') return 'off';
  if (isCircle(val))   return 'full';  // ○ = 8時間以上扱い
  if (isTriangle(val)) return 'part';  // △ = 8時間未満扱い
  const m = val.match(/^(\d{1,2})-(\d{1,2})$/);
  if (m) {
    const h = parseInt(m[2]) - parseInt(m[1]);
    if (h >= 8) return 'full';
    if (h > 0)  return 'part';
  }
  return 'bad';
}

let state = loadState();
let curYear, curMonth;
let holidays = {};

function loadState() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) return JSON.parse(s); } catch(e) {}
  return {members:['植田','菅原','本郷','山口'], shifts:{}, notes:{}, memberColors:{}};
}
function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }

async function fetchHolidays(year) {
  if (holidays[year]) return;
  try {
    const r = await fetch(`https://holidays-jp.github.io/api/v1/${year}/date.json`);
    holidays[year] = r.ok ? await r.json() : {};
  } catch(e) { holidays[year] = {}; }
}
function getHoliday(y, m, d) {
  const h = holidays[y]; if (!h) return null;
  const k = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  return h[k] || null;
}
function isLocked() {
  const now = new Date();
  const ty = now.getFullYear(), tm = now.getMonth(), td = now.getDate();
  if (curYear < ty || (curYear === ty && curMonth < tm)) return true;
  if (curYear === ty && curMonth === tm && td > 25) return true;
  if (curYear === ty && curMonth === tm) return false;
  if (curYear === ty && curMonth === tm+1) return false;
  if (curYear === ty+1 && curMonth === 0 && tm === 11) return false;
  return true;
}

async function init() {
  const now = new Date();
  curYear = now.getFullYear(); curMonth = now.getMonth();
  await fetchHolidays(curYear);
  render();
}
async function changeMonth(d) {
  curMonth += d;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  if (curMonth < 0)  { curMonth = 11; curYear--; }
  await fetchHolidays(curYear);
  render();
}

function render() {
  const now = new Date();
  const ty = now.getFullYear(), tm = now.getMonth(), td = now.getDate();
  const locked = isLocked();
  const dim = new Date(curYear, curMonth+1, 0).getDate();
  const dn = ['日','月','火','水','木','金','土'];
  const rk = `${curYear}-${curMonth+1}`;

  document.getElementById('month-title').textContent = `${curYear}年${curMonth+1}月`;
  const badge = document.getElementById('status-badge');
  if (!locked) { badge.textContent = `入力受付中（締切 ${curMonth+1}/25）`; badge.className = 'status-badge badge-open'; }
  else         { badge.textContent = '確定済み'; badge.className = 'status-badge badge-locked'; }

  // メンバーバー
  const bar = document.getElementById('members-bar');
  bar.innerHTML = '';
  state.members.forEach((m, i) => {
    const clr = getMemberColor(m, i);
    const c = document.createElement('div'); c.className = 'member-chip'; c.style.background = clr.bg;
    c.innerHTML = `<div class="member-avatar" style="background:${clr.dot};">${m[0]}</div><span>${m}</span><button class="remove-btn" onclick="removeMember(${i})">×</button>`;
    bar.appendChild(c);
  });
  const ab = document.createElement('button'); ab.className = 'add-btn'; ab.textContent = '＋ メンバー追加'; ab.onclick = openModal;
  bar.appendChild(ab);

  // ヘッダー
  let hh = `<tr><th class="day-col">日付</th>`;
  state.members.forEach((m, i) => {
    const clr = getMemberColor(m, i);
    hh += `<th><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${clr.dot};margin-right:5px;vertical-align:middle;"></span>${m}</th>`;
  });
  hh += `<th style="font-size:12px;">在籍</th><th class="note-col">備考</th></tr>`;
  document.getElementById('t-head').innerHTML = hh;

  // ボディ
  let bh = '';
  for (let d = 1; d <= dim; d++) {
    const date = new Date(curYear, curMonth, d);
    const dow = date.getDay();
    const isSat = dow===6, isSun = dow===0;
    const hname = getHoliday(curYear, curMonth, d);
    const isHoliday = !!hname;
    const isToday = curYear===ty && curMonth===tm && d===td;
    const isDeadline = curYear===ty && curMonth===tm && d===25;
    const noteKey = `${rk}-note-${d}`;
    const noteVal = (state.notes && state.notes[noteKey]) || '';
    const isOffDay = isSat || isSun || isHoliday;

    let rowCls = '';
    if (isToday) rowCls = 'row-today';
    else if (isSun || isHoliday) rowCls = 'row-sun';
    else if (isSat) rowCls = 'row-sat';

    const dowColor = (isSun||isHoliday) ? 'color:#e24b4a' : isSat ? 'color:#378ADD' : 'color:#aaa';

    bh += `<tr class="${rowCls}"><td class="day-cell"><div class="day-info">`;
    bh += `<span class="day-num">${d}</span><span class="day-dow" style="${dowColor}">${dn[dow]}</span>`;
    if (isHoliday)   bh += `<span class="day-holiday">${hname}</span>`;
    else if (isDeadline) bh += `<span class="day-holiday" style="color:#ba7517;">締切</span>`;
    if (isToday) bh += `<span class="today-marker"></span>`;
    bh += `</div></td>`;

    let cnt = 0;
    state.members.forEach((m, mi) => {
      const ck = `${rk}-${d}-${m}`;
      const val = state.shifts[ck] || '';
      const status = getStatus(val);
      if (status && status !== 'off') cnt++;

      if (locked) {
        if      (status === 'full') bh += `<td><span class="tag-full">${val}</span></td>`;
        else if (status === 'part') bh += `<td><span class="tag-part">${val}</span></td>`;
        else if (status === 'off')  bh += `<td><span class="tag-off">欠席</span></td>`;
        else bh += `<td>${val ? `<span style="font-size:12px;">${val}</span>` : '<span class="empty-val">—</span>'}</td>`;
      } else {
        const cls = 'si' + (status ? ' '+status : '');
        bh += `<td style="vertical-align:middle;">`;
        bh += `<input class="${cls}" type="text" value="${val}" maxlength="6" placeholder="${isOffDay?'—':''}" data-key="${ck}" oninput="onInput(this)" onblur="onBlur(this)">`;
        if (val && status !== 'off') {
          bh += `<br><button class="absent-btn" onclick="markAbsent('${ck}')">欠席にする</button>`;
        } else if (status === 'off') {
          bh += `<br><button class="absent-btn" onclick="clearVal('${ck}')">元に戻す</button>`;
        }
        bh += `</td>`;
      }
    });

    bh += `<td class="summary-col">${cnt > 0 ? cnt+'名' : ''}</td>`;
    if (locked) {
      bh += `<td>${noteVal ? `<span class="note-tag">${noteVal}</span>` : '<span class="empty-val">—</span>'}</td>`;
    } else {
      bh += `<td><input class="note-input${noteVal?' has-note':''}" type="text" value="${noteVal}" maxlength="20" placeholder="例）更新業務" data-nkey="${noteKey}" oninput="onNoteInput(this)" onblur="onNoteBlur(this)"></td>`;
    }
    bh += `</tr>`;
  }

  bh += `<tr class="count-row"><td>月間勤務日数</td>`;
  state.members.forEach(m => {
    let cnt = 0;
    for (let d = 1; d <= dim; d++) {
      const s = getStatus(state.shifts[`${rk}-${d}-${m}`] || '');
      if (s && s !== 'off') cnt++;
    }
    bh += `<td>${cnt}日</td>`;
  });
  bh += `<td></td><td></td></tr>`;
  document.getElementById('t-body').innerHTML = bh;
}

function onInput(el) {
  const v = el.value.trim();
  const s = getStatus(v);
  el.className = 'si' + (s ? ' '+s : (v ? ' bad' : ''));
}
function onBlur(el) {
  state.shifts[el.dataset.key] = el.value.trim();
  saveState();
  render();
}
function markAbsent(key) { state.shifts[key] = '欠席'; saveState(); render(); }
function clearVal(key)    { state.shifts[key] = '';     saveState(); render(); }
function onNoteInput(el)  { el.className = 'note-input' + (el.value.trim() ? ' has-note' : ''); }
function onNoteBlur(el)   { if (!state.notes) state.notes = {}; state.notes[el.dataset.nkey] = el.value.trim(); saveState(); render(); }

function removeMember(idx) {
  const name = state.members[idx]; state.members.splice(idx, 1);
  Object.keys(state.shifts).forEach(k => { if (k.endsWith('-'+name)) delete state.shifts[k]; });
  saveState(); render();
}
function openModal()  { document.getElementById('modal').classList.add('open'); setTimeout(()=>document.getElementById('new-name').focus(), 50); }
function closeModal() { document.getElementById('modal').classList.remove('open'); document.getElementById('new-name').value = ''; }
function doAdd() {
  const name = document.getElementById('new-name').value.trim();
  const color = document.getElementById('new-color').value;
  if (!name) return;
  if (state.members.includes(name)) { showToast('同じ名前のメンバーが既にいます'); return; }
  state.members.push(name);
  if (!state.memberColors) state.memberColors = {};
  state.memberColors[name] = color;
  saveState(); closeModal(); render();
  showToast(`${name} を追加しました`);
}

function exportCSV() {
  const dim = new Date(curYear, curMonth+1, 0).getDate();
  const rk = `${curYear}-${curMonth+1}`;
  const dn = ['日','月','火','水','木','金','土'];
  let csv = `日付,曜日,祝日,${state.members.join(',')},在籍人数,備考\n`;
  for (let d = 1; d <= dim; d++) {
    const date = new Date(curYear, curMonth, d);
    const hname = getHoliday(curYear, curMonth, d) || '';
    const note = (state.notes && state.notes[`${rk}-note-${d}`]) || '';
    let cnt = 0;
    const cells = state.members.map(m => { const v = state.shifts[`${rk}-${d}-${m}`]||''; if(v&&v!=='欠席') cnt++; return v; });
    csv += `${curYear}/${curMonth+1}/${d},${dn[date.getDay()]},${hname},${cells.join(',')},${cnt},${note}\n`;
  }
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = `シフト_${curYear}${String(curMonth+1).padStart(2,'0')}.csv`; a.click();
  showToast('CSVを出力しました');
}
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>

</div>
</body>
