<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PL・達成管理 — サポートチーム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;}
.container{max-width:1000px;margin:0 auto;padding:1.5rem 2rem;}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#888;text-decoration:none;background:#f0f0eb;border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;padding:5px 12px;margin-bottom:1rem;}
h1{font-size:20px;font-weight:500;color:#1a1a1a;margin-bottom:1.25rem;}

/* ログイン */
.login-screen{min-height:80vh;display:flex;align-items:center;justify-content:center;}
.login-card{background:#fff;border-radius:16px;border:0.5px solid rgba(0,0,0,0.1);padding:2rem;width:320px;}
.login-title{font-size:16px;font-weight:500;color:#1a1a1a;margin-bottom:4px;}
.login-sub{font-size:12px;color:#aaa;margin-bottom:1.5rem;}
.login-members{display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem;}
.member-login-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:0.5px solid rgba(0,0,0,0.1);background:#fafafa;cursor:pointer;font-family:inherit;font-size:13px;color:#1a1a1a;text-align:left;transition:background 0.1s;}
.member-login-btn:hover{background:#f0f0eb;}
.member-login-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.pw-section{border-top:0.5px solid rgba(0,0,0,0.07);padding-top:1rem;}
.pw-label{font-size:11px;color:#aaa;margin-bottom:6px;}
.pw-input{width:100%;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;margin-bottom:8px;}
.pw-input:focus{border-color:#378ADD;}
.pw-error{font-size:12px;color:#e24b4a;margin-bottom:8px;min-height:16px;}
.pw-submit{width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:9px;font-size:13px;cursor:pointer;font-family:inherit;}
.pw-submit:hover{background:#333;}

/* トップバー */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px;}
.user-info{display:flex;align-items:center;gap:8px;}
.user-dot{width:10px;height:10px;border-radius:50%;}
.user-name{font-size:14px;font-weight:500;}
.logout-btn{font-size:12px;color:#aaa;background:none;border:0.5px solid rgba(0,0,0,0.13);border-radius:7px;padding:4px 10px;cursor:pointer;font-family:inherit;}
.logout-btn:hover{color:#e24b4a;}

/* 月ナビ */
.month-nav-wrap{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px;}
.month-nav{display:flex;align-items:center;gap:10px;}
.month-title{font-size:16px;font-weight:500;color:#1a1a1a;min-width:110px;text-align:center;}
.nav-btn{background:#f0f0eb;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:5px 13px;cursor:pointer;font-size:13px;color:#1a1a1a;font-family:inherit;}
.nav-btn:hover{background:#e5e5e0;}
.today-btn{background:#fff;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:5px 13px;cursor:pointer;font-size:13px;color:#1a1a1a;font-family:inherit;}

/* サマリーカード */
.summary-card{background:#fff;border-radius:14px;border:0.5px solid rgba(0,0,0,0.1);padding:18px 22px;margin-bottom:18px;}
.summary-card-title{font-size:12px;font-weight:500;color:#aaa;letter-spacing:0.05em;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.summary-card-title::after{content:'';flex:1;height:0.5px;background:rgba(0,0,0,0.07);}
.summary-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.summary-item{display:flex;flex-direction:column;gap:8px;}
.summary-member{display:flex;align-items:center;gap:7px;}
.summary-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:#fff;flex-shrink:0;}
.summary-name{font-size:13px;font-weight:500;color:#1a1a1a;}
.summary-bar-wrap{height:8px;background:#f0f0eb;border-radius:4px;overflow:hidden;}
.summary-bar-fill{height:100%;border-radius:4px;transition:width 0.3s;}
.summary-nums{display:flex;align-items:center;justify-content:space-between;}
.summary-frac{font-size:11px;color:#aaa;}
.summary-pct{font-size:13px;font-weight:500;}
.summary-total-row{margin-top:14px;padding-top:12px;border-top:0.5px solid rgba(0,0,0,0.06);display:flex;align-items:center;gap:16px;}
.summary-total-label{font-size:12px;color:#aaa;white-space:nowrap;}
.summary-total-bar-wrap{flex:1;height:8px;background:#f0f0eb;border-radius:4px;overflow:hidden;}
.summary-total-fill{height:100%;border-radius:4px;transition:width 0.3s;}
.summary-total-pct{font-size:13px;font-weight:500;min-width:40px;text-align:right;}

/* メンバーカード */
.members-grid{display:flex;flex-direction:column;gap:14px;}
.member-card{background:#fff;border-radius:14px;border:0.5px solid rgba(0,0,0,0.1);overflow:hidden;}
.member-header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:0.5px solid rgba(0,0,0,0.07);flex-wrap:wrap;gap:8px;}
.member-info{display:flex;align-items:center;gap:9px;}
.member-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#fff;flex-shrink:0;}
.member-name{font-size:14px;font-weight:500;color:#1a1a1a;}
.member-stats{display:flex;align-items:center;gap:10px;}
.stat{font-size:12px;color:#aaa;}
.stat strong{color:#1a1a1a;font-weight:500;}
.progress-wrap{display:flex;align-items:center;gap:8px;}
.progress-bar{width:80px;height:6px;background:#f0f0eb;border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transition:width 0.3s;}
.progress-pct{font-size:12px;font-weight:500;min-width:32px;text-align:right;}

/* タブ */
.card-tabs{display:flex;border-bottom:0.5px solid rgba(0,0,0,0.07);}
.card-tab{padding:8px 16px;font-size:12px;cursor:pointer;color:#aaa;border-bottom:2px solid transparent;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none;}
.card-tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500;}
.card-tab-badge{display:inline-block;background:#fef9e0;color:#7a6000;border-radius:10px;padding:0px 6px;font-size:10px;margin-left:4px;}

/* 目標タブ */
.card-body{padding:14px 18px;}
.goal-list{display:flex;flex-direction:column;gap:7px;margin-bottom:12px;}
.goal-row{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:10px;border:0.5px solid rgba(0,0,0,0.08);background:#fafafa;}
.goal-row.achieved{background:#f0faf4;border-color:rgba(59,158,90,0.2);}
.goal-row.pending{background:#fef9e0;border-color:rgba(245,197,24,0.3);}
.check-box{width:20px;height:20px;border-radius:6px;border:1.5px solid rgba(0,0,0,0.18);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;}
.check-box.pending-chk{border-color:#f5c518;background:#fef9e0;}
.check-box.pending-chk::after{content:'';display:block;width:6px;height:6px;border-radius:50%;background:#f5c518;}
.check-box.checked{border-color:#3b9e5a;background:#3b9e5a;}
.check-box.checked::after{content:'';display:block;width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);}
.check-box.readonly{cursor:default;opacity:0.6;}
.goal-content{flex:1;min-width:0;}
.goal-text{font-size:13px;color:#1a1a1a;line-height:1.5;word-break:break-all;}
.goal-row.achieved .goal-text{color:#aaa;text-decoration:line-through;}
.goal-sub{font-size:11px;margin-top:2px;}
.goal-del{background:none;border:none;cursor:pointer;color:#ddd;font-size:14px;padding:0 2px;line-height:1;flex-shrink:0;margin-top:2px;}
.goal-del:hover{color:#e24b4a;}
.status-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;border-radius:5px;padding:2px 7px;flex-shrink:0;white-space:nowrap;}
.badge-pending{background:#fef9e0;color:#7a6000;border:0.5px solid #f5c518;}
.badge-achieved{background:#eaf3de;color:#3b6d11;border:0.5px solid #3b9e5a;}
.badge-rejected{background:#fcebeb;color:#a32d2d;border:0.5px solid #e24b4a;}
.approve-btns{display:flex;gap:5px;flex-shrink:0;}
.btn-approve{background:#eaf3de;border:0.5px solid #3b9e5a;border-radius:6px;padding:3px 10px;font-size:11px;color:#3b6d11;cursor:pointer;font-family:inherit;}
.btn-approve:hover{background:#c0dd97;}
.btn-reject{background:#fcebeb;border:0.5px solid #e24b4a;border-radius:6px;padding:3px 10px;font-size:11px;color:#a32d2d;cursor:pointer;font-family:inherit;}
.btn-reject:hover{background:#f7c1c1;}
.empty-goals{font-size:13px;color:#bbb;text-align:center;padding:1rem 0 0.5rem;}
.add-area{display:flex;gap:8px;align-items:flex-start;}
.add-input{flex:1;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:7px 10px;font-size:13px;color:#1a1a1a;background:#fff;font-family:inherit;outline:none;resize:none;line-height:1.5;}
.add-input:focus{border-color:#378ADD;}
.add-submit{background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;}
.add-submit:hover{background:#333;}

/* 承認一覧タブ */
.approval-list{display:flex;flex-direction:column;gap:6px;}
.approval-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.07);background:#fafafa;}
.approval-status{font-size:11px;border-radius:5px;padding:2px 8px;white-space:nowrap;flex-shrink:0;}
.approval-text{font-size:13px;color:#1a1a1a;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.approval-date{font-size:11px;color:#bbb;flex-shrink:0;}
.no-approval{font-size:13px;color:#bbb;text-align:center;padding:1rem 0;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#fff;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:8px 18px;font-size:13px;color:#1a1a1a;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:200;white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,0,0.1);}
.toast.show{opacity:1;}
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, updatePassword, reauthenticateWithCredential, EmailAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  const firebaseConfig = {
  apiKey: "AIzaSyBYqng6-vn341KhqtyjjdIJKbxN8J__ndQ",
  authDomain: "support-team-hub.firebaseapp.com",
  projectId: "support-team-hub",
  storageBucket: "support-team-hub.firebasestorage.app",
  messagingSenderId: "698402996312",
  appId: "1:698402996312:web:7ceec4c0e7fe15ce2cca2d"
};
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const ADMIN_EMAILS = ["suzuki@support.com"];

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('firebase-login-screen').style.display = 'none';
      document.getElementById('firebase-app-content').style.display = 'block';
      const isAdmin = ADMIN_EMAILS.includes(user.email);
      window.firebaseUser = { email: user.email, isAdmin };
      window.dispatchEvent(new Event('firebase-ready'));
    } else {
      document.getElementById('firebase-login-screen').style.display = 'flex';
      document.getElementById('firebase-app-content').style.display = 'none';
    }
  });

  window.firebaseLogin = async function() {
    const email = document.getElementById('fb-email').value.trim();
    const password = document.getElementById('fb-password').value;
    const errEl = document.getElementById('fb-error');
    errEl.textContent = '';
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch(e) {
      errEl.textContent = 'メアドまたはパスワードが違います';
    }
  };

  window.firebaseLogout = async function() {
    await signOut(auth);
  };

  window.firebaseChangePassword = async function() {
    const current = document.getElementById('pw-current').value;
    const newpw = document.getElementById('pw-new').value;
    const confirm = document.getElementById('pw-confirm').value;
    const errEl = document.getElementById('pw-error');
    errEl.textContent = '';
    if(newpw !== confirm){ errEl.textContent = '新しいパスワードが一致しません'; return; }
    if(newpw.length < 6){ errEl.textContent = 'パスワードは6文字以上にしてください'; return; }
    try {
      const user = auth.currentUser;
      const credential = EmailAuthProvider.credential(user.email, current);
      await reauthenticateWithCredential(user, credential);
      await updatePassword(user, newpw);
      document.getElementById('pw-success').textContent = 'パスワードを変更しました！';
      document.getElementById('pw-current').value = '';
      document.getElementById('pw-new').value = '';
      document.getElementById('pw-confirm').value = '';
    } catch(e) {
      errEl.textContent = '現在のパスワードが違います';
    }
  };

  document.addEventListener('keydown', function(e) {
    if(e.key === 'Enter' && document.getElementById('firebase-login-screen').style.display !== 'none') {
      window.firebaseLogin();
    }
  });
</script>

</head>
<body>
<div id="firebase-login-screen" style="display:flex;min-height:100vh;align-items:center;justify-content:center;background:#f5f5f0;position:fixed;inset:0;z-index:9999;">
  <div style="background:#fff;border-radius:16px;border:0.5px solid rgba(0,0,0,0.1);padding:2rem;width:340px;">
    <div style="font-size:16px;font-weight:500;color:#1a1a1a;margin-bottom:4px;">サポートチーム ツールハブ</div>
    <div style="font-size:13px;color:#aaa;margin-bottom:1.5rem;">メアドとパスワードでログイン</div>
    <div style="font-size:11px;color:#aaa;margin-bottom:4px;">メールアドレス</div>
    <input id="fb-email" type="email" placeholder="example@company.com" style="width:100%;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:9px 10px;font-size:13px;font-family:inherit;outline:none;margin-bottom:10px;">
    <div style="font-size:11px;color:#aaa;margin-bottom:4px;">パスワード</div>
    <input id="fb-password" type="password" placeholder="パスワード" style="width:100%;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:9px 10px;font-size:13px;font-family:inherit;outline:none;margin-bottom:8px;">
    <div id="fb-error" style="font-size:12px;color:#e24b4a;margin-bottom:8px;min-height:16px;"></div>
    <button onclick="firebaseLogin()" style="width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;cursor:pointer;font-family:inherit;">ログイン</button>
    <div style="margin-top:1rem;padding-top:1rem;border-top:0.5px solid rgba(0,0,0,0.07);font-size:11px;color:#bbb;text-align:center;">パスワードを忘れた場合は管理者にお問い合わせください</div>
  </div>
</div>
<div id="firebase-user-bar" style="position:fixed;top:12px;right:16px;z-index:500;display:flex;align-items:center;gap:8px;">
  <span id="firebase-user-email" style="font-size:12px;color:#888;"></span>
  <button onclick="document.getElementById('pw-modal-bg').style.display='flex'" style="font-size:12px;color:#aaa;background:#fff;border:0.5px solid rgba(0,0,0,0.13);border-radius:7px;padding:4px 10px;cursor:pointer;font-family:inherit;">🔑 PW変更</button>
  <button onclick="firebaseLogout()" style="font-size:12px;color:#aaa;background:#fff;border:0.5px solid rgba(0,0,0,0.13);border-radius:7px;padding:4px 10px;cursor:pointer;font-family:inherit;">ログアウト</button>
</div>
<script>
window.addEventListener('firebase-ready', function() {
  const bar = document.getElementById('firebase-user-bar');
  if(bar && window.firebaseUser) {
    document.getElementById('firebase-user-email').textContent = window.firebaseUser.email;
  }
});
</script>
<div id="pw-modal-bg" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.25);z-index:9998;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:14px;padding:1.5rem;width:320px;margin:1rem;">
    <div style="font-size:15px;font-weight:500;margin-bottom:1rem;">パスワードを変更</div>
    <div style="font-size:11px;color:#aaa;margin-bottom:4px;">現在のパスワード</div>
    <input id="pw-current" type="password" style="width:100%;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;margin-bottom:10px;">
    <div style="font-size:11px;color:#aaa;margin-bottom:4px;">新しいパスワード</div>
    <input id="pw-new" type="password" style="width:100%;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;margin-bottom:10px;">
    <div style="font-size:11px;color:#aaa;margin-bottom:4px;">新しいパスワード（確認）</div>
    <input id="pw-confirm" type="password" style="width:100%;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;margin-bottom:8px;">
    <div id="pw-error" style="font-size:12px;color:#e24b4a;min-height:16px;margin-bottom:4px;"></div>
    <div id="pw-success" style="font-size:12px;color:#3b9e5a;min-height:16px;margin-bottom:8px;"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button onclick="document.getElementById('pw-modal-bg').style.display='none'" style="background:transparent;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:#888;font-family:inherit;">キャンセル</button>
      <button onclick="firebaseChangePassword()" style="background:#1a1a1a;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:#fff;font-family:inherit;">変更する</button>
    </div>
  </div>
</div>
<div id="firebase-app-content" style="display:none;">
<div class="container">
  <a class="back-btn" href="ホーム.html">◀ ホームに戻る</a>
  <h1>PL・達成管理 <span style="font-size:13px;color:#888;font-weight:400;">サポートチーム</span></h1>
  <div id="app"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY='pl_v1';
const MEMBERS=[
  {name:'植田',dot:'#b0b0b0',pw:'ueda2024'},
  {name:'菅原',dot:'#e91e8c',pw:'sugawara2024'},
  {name:'吉崎',dot:'#378ADD',pw:'yoshizaki2024'},
  {name:'本郷',dot:'#f5c518',pw:'hongo2024'},
  {name:'山口',dot:'#ff7f2a',pw:'yamaguchi2024'},
  {name:'鈴木',dot:'#3b9e5a',pw:'suzuki2024',isAdmin:true},
];

let state=loadState();
let curUser=null;
let curYear,curMonth;
let selectedLoginMember=null;
// 各メンバーカードの表示タブ: 'goals' | 'approval'
let cardTabs={};

function loadState(){
  try{const s=localStorage.getItem(STORAGE_KEY);if(s)return JSON.parse(s);}catch(e){}
  return{goals:{}};
}
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}}
function rk(y,m,n){return `${y}-${m+1}-${n}`;}
function getGoals(y,m,n){
  const k=rk(y,m,n);
  if(!state.goals[k])state.goals[k]=[];
  return state.goals[k];
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function getStatus(g){if(g.status)return g.status;if(g.achieved)return'achieved';return'';}

async function init(){
  const now=new Date();curYear=now.getFullYear();curMonth=now.getMonth();
  const saved=sessionStorage.getItem('pl_user');
  if(saved)curUser=MEMBERS.find(m=>m.name===saved)||null;
  render();
}

function render(){
  if(!curUser){renderLogin();return;}
  renderMain();
}

/* ===== ログイン ===== */
function renderLogin(){
  document.getElementById('app').innerHTML=`
    <div class="login-screen">
      <div class="login-card">
        <div class="login-title">PL・達成管理にログイン</div>
        <div class="login-sub">メンバーを選んでパスワードを入力してください</div>
        <div class="login-members">
          ${MEMBERS.map(m=>`
            <button class="member-login-btn" onclick="selectMember('${m.name}')">
              <div class="member-login-dot" style="background:${m.dot};"></div>
              ${m.name}${m.isAdmin?' （管理者）':''}
            </button>`).join('')}
        </div>
        <div class="pw-section" id="pw-section" style="display:none;">
          <div class="pw-label" id="pw-label">パスワードを入力</div>
          <input class="pw-input" type="password" id="pw-input" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()">
          <div class="pw-error" id="pw-error"></div>
          <button class="pw-submit" onclick="doLogin()">ログイン</button>
        </div>
      </div>
    </div>`;
}
function selectMember(name){
  selectedLoginMember=name;
  document.getElementById('pw-section').style.display='block';
  document.getElementById('pw-label').textContent=`${name} のパスワードを入力`;
  document.getElementById('pw-error').textContent='';
  document.getElementById('pw-input').value='';
  setTimeout(()=>document.getElementById('pw-input').focus(),50);
}
function doLogin(){
  if(!selectedLoginMember)return;
  const pw=document.getElementById('pw-input').value;
  const member=MEMBERS.find(m=>m.name===selectedLoginMember);
  if(member&&pw===member.pw){
    curUser=member;sessionStorage.setItem('pl_user',member.name);render();
  }else{
    document.getElementById('pw-error').textContent='パスワードが違います';
    document.getElementById('pw-input').value='';document.getElementById('pw-input').focus();
  }
}
function logout(){curUser=null;selectedLoginMember=null;sessionStorage.removeItem('pl_user');render();}

/* ===== メイン ===== */
function renderMain(){
  document.getElementById('app').innerHTML=`
    <div class="topbar">
      <div class="user-info">
        <div class="user-dot" style="background:${curUser.dot};"></div>
        <div class="user-name">${curUser.name}${curUser.isAdmin?' （管理者）':''}</div>
        <button class="logout-btn" onclick="logout()">ログアウト</button>
      </div>
      <div class="month-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <span class="month-title" id="month-title"></span>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
        <button class="today-btn" onclick="goToday()">今月</button>
      </div>
    </div>
    <div id="summary-wrap"></div>
    <div class="members-grid" id="members-grid"></div>`;

  document.getElementById('month-title').textContent=`${curYear}年${curMonth+1}月`;
  renderSummary();
  renderAllCards();
}
function changeMonth(d){
  curMonth+=d;if(curMonth>11){curMonth=0;curYear++;}if(curMonth<0){curMonth=11;curYear--;}
  document.getElementById('month-title').textContent=`${curYear}年${curMonth+1}月`;
  renderSummary();renderAllCards();
}
function goToday(){const now=new Date();curYear=now.getFullYear();curMonth=now.getMonth();
  document.getElementById('month-title').textContent=`${curYear}年${curMonth+1}月`;
  renderSummary();renderAllCards();}

function renderSummary(){
  const data=MEMBERS.filter(m=>!m.isAdmin).map(mb=>{
    const goals=getGoals(curYear,curMonth,mb.name);
    const total=goals.length;
    const done=goals.filter(g=>getStatus(g)==='achieved').length;
    const pending=goals.filter(g=>getStatus(g)==='pending').length;
    const pct=total>0?Math.round(done/total*100):0;
    const fillColor=pct>=100?'#3b9e5a':pct>=50?'#378ADD':'#f5c518';
    return{mb,total,done,pending,pct,fillColor};
  });
  const totalAll=data.reduce((s,d)=>s+d.total,0);
  const doneAll=data.reduce((s,d)=>s+d.done,0);
  const pendingAll=data.reduce((s,d)=>s+d.pending,0);
  const pctAll=totalAll>0?Math.round(doneAll/totalAll*100):0;
  const fillAll=pctAll>=100?'#3b9e5a':pctAll>=50?'#378ADD':'#f5c518';

  const cols=data.map(d=>`
    <div class="summary-item">
      <div class="summary-member">
        <div class="summary-avatar" style="background:${d.mb.dot};">${d.mb.name[0]}</div>
        <div class="summary-name">${d.mb.name}</div>
      </div>
      <div class="summary-bar-wrap"><div class="summary-bar-fill" style="width:${d.pct}%;background:${d.fillColor};"></div></div>
      <div class="summary-nums">
        <span class="summary-frac">${d.done}/${d.total}件${d.pending>0?` <span style="color:#ba7517;font-size:10px;">待${d.pending}</span>`:''}</span>
        <span class="summary-pct" style="color:${d.fillColor};">${d.pct}%</span>
      </div>
    </div>`).join('');

  document.getElementById('summary-wrap').innerHTML=`
    <div class="summary-card">
      <div class="summary-card-title">今月の達成率サマリー${pendingAll>0?` <span style="color:#ba7517;font-size:11px;font-weight:400;">承認待ち ${pendingAll}件</span>`:''}</div>
      <div class="summary-grid">${cols}</div>
      <div class="summary-total-row">
        <span class="summary-total-label">チーム全体</span>
        <div class="summary-total-bar-wrap"><div class="summary-total-fill" style="width:${pctAll}%;background:${fillAll};"></div></div>
        <span class="summary-total-pct" style="color:${fillAll};">${pctAll}%</span>
      </div>
    </div>`;
}

function renderAllCards(){
  const grid=document.getElementById('members-grid');
  if(!grid)return;
  grid.innerHTML='';
  MEMBERS.filter(m=>!m.isAdmin).forEach(mb=>{
    grid.appendChild(buildMemberCard(mb));
  });
}

function buildMemberCard(mb){
  const goals=getGoals(curYear,curMonth,mb.name);
  const total=goals.length;
  const done=goals.filter(g=>getStatus(g)==='achieved').length;
  const pending=goals.filter(g=>getStatus(g)==='pending').length;
  const pct=total>0?Math.round(done/total*100):0;
  const fillColor=pct>=100?'#3b9e5a':pct>=50?'#378ADD':'#f5c518';
  const tab=cardTabs[mb.name]||'goals';
  const canEdit=curUser.name===mb.name||curUser.isAdmin;

  const card=document.createElement('div');
  card.className='member-card';card.id=`card-${mb.name}`;

  // タブバッジ
  const pendingBadge=pending>0?`<span class="card-tab-badge">${pending}</span>`:'';

  card.innerHTML=`
    <div class="member-header">
      <div class="member-info">
        <div class="member-avatar" style="background:${mb.dot};">${mb.name[0]}</div>
        <div class="member-name">${mb.name}</div>
      </div>
      <div class="member-stats">
        <span class="stat"><strong>${done}</strong>/${total} 達成</span>
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${fillColor};"></div></div>
          <span class="progress-pct" style="color:${fillColor};">${pct}%</span>
        </div>
      </div>
    </div>
    <div class="card-tabs">
      <button class="card-tab${tab==='goals'?' active':''}" onclick="switchTab('${mb.name}','goals')">目標一覧</button>
      <button class="card-tab${tab==='approval'?' active':''}" onclick="switchTab('${mb.name}','approval')">承認状況${pendingBadge}</button>
    </div>
    <div class="card-body" id="body-${mb.name}">
      ${tab==='goals'?buildGoalsTab(mb,goals,canEdit):buildApprovalTab(mb,goals)}
    </div>`;
  return card;
}

function switchTab(name,tab){
  cardTabs[name]=tab;
  const mb=MEMBERS.find(m=>m.name===name);
  if(mb){
    const old=document.getElementById(`card-${name}`);
    if(old)old.replaceWith(buildMemberCard(mb));
  }
}

function buildGoalsTab(mb,goals,canEdit){
  if(goals.length===0){
    return `<div class="empty-goals">目標を追加してください</div>
      ${canEdit?`<div class="add-area">
        <textarea class="add-input" id="input-${mb.name}" placeholder="目標を入力（Enterで追加）" rows="1" onkeydown="handleKey(event,'${mb.name}')"></textarea>
        <button class="add-submit" onclick="addGoal('${mb.name}')">追加</button>
      </div>`:''}`;
  }

  const rows=goals.map((g,i)=>{
    const st=getStatus(g);
    const rowCls=st==='achieved'?' achieved':st==='pending'?' pending':'';
    const isOwn=curUser.name===mb.name;
    const isAdmin=curUser.isAdmin;

    let checkEl='';
    if(st==='achieved'){
      checkEl=`<div class="check-box checked readonly"></div>`;
    }else if(st==='pending'){
      checkEl=`<div class="check-box pending-chk${isOwn?' readonly':''}" ${isOwn?'title="承認待ちです"':'onclick="void(0)"'}></div>`;
    }else{
      // 未チェック：本人のみクリック可
      checkEl=isOwn
        ?`<div class="check-box" onclick="togglePending('${mb.name}',${i})"></div>`
        :`<div class="check-box readonly"></div>`;
    }

    let actionEl='';
    if(isAdmin&&st==='pending'){
      actionEl=`<div class="approve-btns">
        <button class="btn-approve" onclick="approveGoal('${mb.name}',${i})">承認</button>
        <button class="btn-reject" onclick="rejectGoal('${mb.name}',${i})">却下</button>
      </div>`;
    }else if(isAdmin&&st==='achieved'){
      actionEl=`<div class="approve-btns"><button class="btn-reject" onclick="rejectGoal('${mb.name}',${i})">取消</button></div>`;
    }else if(st==='pending'){
      actionEl=`<span class="status-badge badge-pending">承認待ち</span>`;
    }else if(st==='achieved'){
      actionEl=`<span class="status-badge badge-achieved">承認済み</span>`;
    }else if(st==='rejected'){
      actionEl=`<span class="status-badge badge-rejected">却下</span>`;
    }

    return `<div class="goal-row${rowCls}">
      ${checkEl}
      <div class="goal-content">
        <div class="goal-text">${esc(g.text)}</div>
        ${g.achievedAt?`<div class="goal-sub" style="color:#3b9e5a;">達成日：${g.achievedAt}</div>`:''}
        ${st==='pending'&&isOwn?`<div class="goal-sub" style="color:#ba7517;">上司の承認待ちです</div>`:''}
        ${st==='rejected'?`<div class="goal-sub" style="color:#e24b4a;">却下されました</div>`:''}
      </div>
      ${actionEl}
      ${canEdit&&st!=='achieved'?`<button class="goal-del" onclick="deleteGoal('${mb.name}',${i})">×</button>`:''}
    </div>`;
  }).join('');

  return `<div class="goal-list">${rows}</div>
    ${canEdit?`<div class="add-area">
      <textarea class="add-input" id="input-${mb.name}" placeholder="目標を入力（Enterで追加）" rows="1" onkeydown="handleKey(event,'${mb.name}')"></textarea>
      <button class="add-submit" onclick="addGoal('${mb.name}')">追加</button>
    </div>`:''}`;
}

function buildApprovalTab(mb,goals){
  const items=goals.filter(g=>getStatus(g)!=='');
  if(items.length===0){
    return `<div class="no-approval">承認・却下・承認待ちの目標がありません</div>`;
  }
  const statusMap={pending:{label:'承認待ち',cls:'badge-pending'},achieved:{label:'承認済み',cls:'badge-achieved'},rejected:{label:'却下',cls:'badge-rejected'}};
  return `<div class="approval-list">`+
    items.map(g=>{
      const st=getStatus(g);
      const sm=statusMap[st]||{label:st,cls:''};
      return `<div class="approval-row">
        <span class="approval-status status-badge ${sm.cls}">${sm.label}</span>
        <span class="approval-text">${esc(g.text)}</span>
        <span class="approval-date">${g.achievedAt||''}</span>
      </div>`;
    }).join('')+`</div>`;
}

function refreshCard(name){
  const mb=MEMBERS.find(m=>m.name===name);
  const old=document.getElementById(`card-${name}`);
  if(old&&mb)old.replaceWith(buildMemberCard(mb));
  renderSummary();
}

function addGoal(name){
  const input=document.getElementById(`input-${name}`);
  const text=input.value.trim();if(!text)return;
  getGoals(curYear,curMonth,name).push({id:uid(),text,status:'',achieved:false,achievedAt:null});
  saveState();refreshCard(name);
  setTimeout(()=>{const el=document.getElementById(`input-${name}`);if(el)el.focus();},30);
}
function handleKey(e,name){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addGoal(name);}}

function togglePending(name,idx){
  const goals=getGoals(curYear,curMonth,name);
  const g=goals[idx];if(!g)return;
  const st=getStatus(g);
  if(st==='achieved')return;
  g.status=st==='pending'?'':'pending';
  saveState();refreshCard(name);
  if(g.status==='pending')showToast('承認待ちにしました。管理者の確認をお待ちください。');
}
function approveGoal(name,idx){
  const goals=getGoals(curYear,curMonth,name);
  const g=goals[idx];if(!g)return;
  g.status='achieved';g.achieved=true;
  const now=new Date();g.achievedAt=`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
  saveState();refreshCard(name);showToast(`${name}さんの目標を承認しました！`);
}
function rejectGoal(name,idx){
  const goals=getGoals(curYear,curMonth,name);
  const g=goals[idx];if(!g)return;
  const wasAchieved=getStatus(g)==='achieved';
  g.status='rejected';g.achieved=false;g.achievedAt=null;
  saveState();refreshCard(name);
  showToast(wasAchieved?'承認を取り消しました':'却下しました');
}
function deleteGoal(name,idx){
  getGoals(curYear,curMonth,name).splice(idx,1);saveState();refreshCard(name);
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
init();
</script>
</div>
</body>
</html>
