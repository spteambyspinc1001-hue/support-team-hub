<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パスワード設定 - サポートチーム ツールハブ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.container{background:#fff;border-radius:14px;box-shadow:0 2px 20px rgba(0,0,0,0.08);padding:40px;max-width:400px;width:100%;}
.logo{text-align:center;margin-bottom:32px;}
.logo-text{font-size:16px;font-weight:500;color:#1a1a1a;}
.logo-sub{font-size:12px;color:#aaa;margin-top:4px;}
.title{font-size:20px;font-weight:500;margin-bottom:8px;text-align:center;}
.subtitle{font-size:13px;color:#888;margin-bottom:24px;text-align:center;line-height:1.6;}
.form-group{margin-bottom:20px;}
.form-label{font-size:12px;color:#aaa;margin-bottom:8px;display:block;font-weight:500;}
.form-input{width:100%;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;}
.form-input:focus{border-color:rgba(0,0,0,0.3);background:#f9f9f7;}
.form-note{font-size:11px;color:#aaa;margin-top:6px;}
.error{font-size:12px;color:#e24b4a;min-height:20px;margin-bottom:12px;display:none;}
.error.show{display:block;}
.success{font-size:12px;color:#3b9e5a;min-height:20px;margin-bottom:12px;display:none;}
.success.show{display:block;}
.button{width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:background 0.15s;}
.button:hover{background:#333;}
.button:disabled{background:#ccc;cursor:not-allowed;}
.info-box{background:#f8f8f5;border:0.5px solid rgba(0,0,0,0.08);border-radius:8px;padding:14px;margin-bottom:20px;font-size:13px;color:#666;line-height:1.6;}
.info-box strong{color:#1a1a1a;}
.link{color:#378ADD;text-decoration:none;cursor:pointer;}
.link:hover{text-decoration:underline;}
</style>
</head>
<body>

<div class="container">
  <div class="logo">
    <div class="logo-text">サポートチーム</div>
    <div class="logo-sub">ツールハブ</div>
  </div>

  <div class="title">パスワード設定</div>
  <div class="subtitle">新しいパスワードを設定して、ツールを使用開始できます</div>

  <div id="error" class="error"></div>
  <div id="success" class="success"></div>

  <div class="info-box">
    <strong>メールアドレス</strong><br>
    <span id="email-display">-</span>
  </div>

  <form id="form" onsubmit="window.handleSubmit(event)">
    <div class="form-group">
      <label class="form-label">新しいパスワード</label>
      <input id="password" type="password" class="form-input" placeholder="6文字以上" required>
      <div class="form-note">大文字・小文字・数字を含めることをお勧めします</div>
    </div>

    <div class="form-group">
      <label class="form-label">パスワード（確認）</label>
      <input id="confirm" type="password" class="form-input" placeholder="もう一度入力してください" required>
    </div>

    <button type="submit" class="button" id="submit-btn">パスワードを設定する</button>
  </form>

  <div style="margin-top:24px;text-align:center;font-size:12px;color:#888;">
    問題が発生した場合は、<span class="link" onclick="window.goHome()">ホームに戻る</span>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, updatePassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyAWehsEgF5saQDl6onG0PTeKJNKtA1mTOY",
    authDomain: "support-team-hub-61ed6.firebaseapp.com",
    projectId: "support-team-hub-61ed6",
    storageBucket: "support-team-hub-61ed6.firebasestorage.app",
    messagingSenderId: "795947969689",
    appId: "1:795947969689:web:7f2565c04ac93fd501dc08"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  
  // グローバルに設定
  window.auth = auth;

  // URLパラメータからメールアドレスとトークンを取得
  const params = new URLSearchParams(window.location.search);
  const email = params.get('email');
  const token = params.get('token');

  console.log('📄 ページロード:', { email, hasToken: !!token });
  document.getElementById('email-display').textContent = email || '不明';

  window.handleSubmit = async function(event) {
    event.preventDefault();
    const errorEl = document.getElementById('error');
    const successEl = document.getElementById('success');
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const submitBtn = document.getElementById('submit-btn');

    errorEl.classList.remove('show');
    successEl.classList.remove('show');

    // バリデーション
    if (!email || !token) {
      errorEl.textContent = 'URLが無効です。招待メールのリンクから再度アクセスしてください。';
      errorEl.classList.add('show');
      return;
    }

    if (!password) {
      errorEl.textContent = 'パスワードを入力してください';
      errorEl.classList.add('show');
      return;
    }

    if (password.length < 6) {
      errorEl.textContent = 'パスワードは6文字以上にしてください';
      errorEl.classList.add('show');
      return;
    }

    if (password !== confirm) {
      errorEl.textContent = 'パスワードが一致しません';
      errorEl.classList.add('show');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = '設定中...';

    try {
      // ローカルストレージから招待情報を取得
      const invites = JSON.parse(localStorage.getItem('invites') || '[]');
      const invite = invites.find(i => i.email === email && i.token === token);

      if (!invite) {
        throw new Error('招待情報が見つかりません。もう一度招待リンクをご確認ください。');
      }

      const tempPassword = invite.tempPassword;
      console.log('📋 招待情報確認済み:', { email, displayName: invite.name });

      let success = false;

      // 方法1: 仮パスワードでサインイン → パスワード更新
      try {
        console.log('🔐 仮パスワードでサインイン試行...');
        const userCred = await signInWithEmailAndPassword(auth, email, tempPassword);
        const user = userCred.user;
        console.log('✅ サインイン成功');

        console.log('🔄 パスワード更新中...');
        await updatePassword(user, password);
        console.log('✅ パスワード更新完了');
        success = true;

      } catch(authError) {
        console.warn('⚠️ 仮パスワードでのサインイン失敗:', authError.code);

        // 方法2: user-not-found の場合、新規ユーザーを作成
        if (authError.code === 'auth/user-not-found') {
          console.log('👤 ユーザーが存在しません。新規作成します...');
          try {
            const userCred = await createUserWithEmailAndPassword(auth, email, password);
            await updateProfile(userCred.user, { displayName: invite.name });
            console.log('✅ 新規ユーザーを作成');
            success = true;
          } catch(createError) {
            console.error('❌ ユーザー作成エラー:', createError.code, createError.message);
            if (createError.code === 'auth/email-already-in-use') {
              // メールが既に使われている場合、仮パスワードで再ログイン
              console.log('👤 メールが既に登録されています。サインインを試みます...');
              try {
                await signInWithEmailAndPassword(auth, email, password);
                console.log('✅ 既存ユーザーでサインイン成功');
                success = true;
              } catch(e) {
                throw new Error('ユーザー認証に失敗しました: ' + createError.message);
              }
            } else {
              throw createError;
            }
          }
        } else if (authError.code === 'auth/wrong-password') {
          // パスワード不一致の場合、新規作成を試みる
          console.log('🔐 パスワード不一致。新規作成を試みます...');
          try {
            const userCred = await createUserWithEmailAndPassword(auth, email, password);
            await updateProfile(userCred.user, { displayName: invite.name });
            console.log('✅ 新規ユーザーを作成');
            success = true;
          } catch(e) {
            throw new Error('パスワード設定に失敗しました: ' + authError.message);
          }
        } else {
          throw authError;
        }
      }

      if (success) {
        // 招待情報を削除
        const updatedInvites = invites.filter(i => !(i.email === email && i.token === token));
        localStorage.setItem('invites', JSON.stringify(updatedInvites));
        console.log('🗑️ 招待情報を削除');

        // 成功メッセージ
        successEl.textContent = '✅ パスワード設定完了！ホームページにリダイレクトしています...';
        successEl.classList.add('show');

        // ホームに遷移
        setTimeout(() => {
          const homeUrl = window.location.pathname.replace('set-password.html', 'ホーム.html');
          console.log('🏠 ホームへリダイレクト:', homeUrl);
          window.location.href = homeUrl;
        }, 2000);
      }

    } catch(e) {
      console.error('❌ エラー:', e.message);
      errorEl.textContent = e.message || 'エラーが発生しました。もう一度お試しください。';
      errorEl.classList.add('show');
    }

    submitBtn.disabled = false;
    submitBtn.textContent = 'パスワードを設定する';
  };

  window.goHome = function() {
    window.location.href = window.location.pathname.replace('set-password.html', 'ホーム.html');
  };
</script>

</body>
</html>
